<script>
  /* ============================================================
     FUNCIONES COMUNES — v10
     Navegación · Mensajes · Formato · Dark mode · Export · Roles
     Búsqueda global · Paginación · Orden de columnas
     ============================================================ */

  var EMPLEADOS_SELECT = [];
  var ROL_ACTUAL = 'consulta'; // 'consulta' | 'rrhh' | 'admin'
  var SESSION_TOKEN = '';
  var _cargandoCount = 0;
  var _memStore = {}; // respaldo si el navegador bloquea storage en el iframe de Google

  function _leerStorage(tipo, clave) {
    try {
      var v = (tipo === 'session' ? sessionStorage : localStorage).getItem(clave);
      if (v !== null && v !== undefined) return v;
    } catch (e) {}
    return _memStore[tipo + ':' + clave] || '';
  }

  function _guardarStorage(tipo, clave, valor) {
    _memStore[tipo + ':' + clave] = valor;
    try {
      (tipo === 'session' ? sessionStorage : localStorage).setItem(clave, valor);
    } catch (e) {}
  }

  function _quitarStorage(tipo, clave) {
    delete _memStore[tipo + ':' + clave];
    try {
      (tipo === 'session' ? sessionStorage : localStorage).removeItem(clave);
    } catch (e) {}
  }

  var CARGADORES = {
    dashboard:      function () { cargarDashboard(); },
    empleados:      function () { cargarEmpleados(); },
    departamentos:  function () { cargarDepartamentos(); },
    asistencia:     function () { cargarAsistencia(); },
    vacaciones:     function () { cargarVacaciones(); },
    nomina:         function () { cargarNomina(); },
    reportes:       function () { cargarReportes(); },
    alertas:        function () { cargarAlertas(); },
    configuracion:  function () { cargarConfiguracion(); },
    capacitaciones: function () { cargarCapacitaciones(); },
    evaluaciones:   function () { cargarEvaluaciones(); },
    documentos:     function () { cargarDocumentos(); },
    bitacora:       function () { cargarBitacora(); },
    prestamos:      function () { cargarPrestamos(); },
    horasextra:     function () { cargarHorasExtra(); },
    activos:        function () { cargarActivos(); },
    turnos:         function () { cargarTurnos(); },
    expediente:     function () { cargarExpediente(); },
    calendario:     function () { cargarCalendario(); },
    organigrama:    function () { cargarOrganigrama(); },
    incapacidades:  function () { cargarIncapacidades(); },
    feriados:       function () { cargarFeriados(); },
    liquidaciones:  function () { cargarLiquidaciones(); }
  };

  var TITULOS = {
    dashboard:      'Dashboard',
    empleados:      'Empleados',
    departamentos:  'Departamentos',
    asistencia:     'Asistencia',
    vacaciones:     'Vacaciones',
    nomina:         'Nómina',

    alertas:        'Alertas',
    configuracion:  'Configuración',
    capacitaciones: 'Capacitaciones',
    evaluaciones:   'Evaluaciones de desempeño',
    documentos:     'Documentos',
    bitacora:       'Bitácora de cambios',
    prestamos:      'Préstamos a empleados',
    horasextra:     'Horas extra',
    activos:        'Activos asignados',
    turnos:         'Gestión de turnos',
    expediente:     'Expediente 360°',
    calendario:     'Calendario de eventos',
    organigrama:    'Organigrama',
    incapacidades:  'Incapacidades CCSS / INS',
    feriados:       'Feriados',
    liquidaciones:  'Liquidaciones laborales'

    expediente:     '<rect x="3" y="4.5" width="18" height="15" rx="2"/><circle cx="9" cy="10.5" r="2.2"/><path d="M5.5 16.5c.6-2 2-3 3.5-3s2.9 1 3.5 3"/><line x1="14.5" y1="9" x2="18.5" y2="9"/><line x1="14.5" y1="12.5" x2="18.5" y2="12.5"/>',

    evaluaciones:   '<polygon points="12,3 14.7,9 21.3,9.6 16.3,13.9 17.8,20.4 12,17 6.2,20.4 7.7,13.9 2.7,9.6 9.3,9"/>',
    documentos:     '<path d="M3.5 6.5c0-1.1.9-2 2-2h4l2 2h7c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2h-13c-1.1 0-2-.9-2-2Z"/>',
    prestamos:      '<rect x="2.5" y="5.5" width="19" height="13" rx="2"/><line x1="2.5" y1="9.5" x2="21.5" y2="9.5"/><line x1="5.5" y1="14.5" x2="10" y2="14.5"/>',
    horasextra:     '<circle cx="12" cy="13" r="8"/><polyline points="12,9 12,13 15,15"/><line x1="9" y1="2.5" x2="15" y2="2.5"/><line x1="12" y1="2.5" x2="12" y2="5"/>',
    activos:        '<rect x="3" y="4.5" width="18" height="12" rx="1.5"/><line x1="8" y1="20" x2="16" y2="20"/><line x1="12" y1="16.5" x2="12" y2="20"/>',

    incapacidades:  '<path d="M4.5 12.5h4l1.5-3 2.5 6 1.5-3h5.5"/><rect x="3" y="5" width="18" height="14" rx="2"/>',
    liquidaciones:  '<path d="M6.5 3.5h8l4 4v13a1 1 0 0 1-1 1h-11a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1Z"/><line x1="8.5" y1="11" x2="15.5" y2="11"/><line x1="8.5" y1="14.5" x2="15.5" y2="14.5"/><line x1="8.5" y1="18" x2="12.5" y2="18"/>',
    calendario:     '<rect x="3" y="4.5" width="18" height="16" rx="2"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/>',
    organigrama:    '<rect x="9" y="3" width="6" height="4.5" rx="1"/><rect x="3" y="16.5" width="6" height="4.5" rx="1"/><rect x="15" y="16.5" width="6" height="4.5" rx="1"/><path d="M12 7.5v4M6 16.5v-3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v3"/>',
    feriados:       '<path d="M5 21V4l1.5-1.2L8 4l1.5-1.2L11 4l1.5-1.2L14 4V13"/><path d="M5 6h9l3 3.5-3 3.5H5"/>',
    alertas:        '<path d="M6 10a6 6 0 0 1 12 0c0 4.5 1.5 6 1.5 6h-15S6 14.5 6 10Z"/><path d="M10 19a2 2 0 0 0 4 0"/>',
    bitacora:       '<rect x="5" y="3.5" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="3" rx="1"/><line x1="8" y1="10.5" x2="16" y2="10.5"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="17.5" x2="13" y2="17.5"/>',
    configuracion:  '<circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.9 7.9 0 0 0 0-3l2-1.5-2-3.5-2.4.7a8 8 0 0 0-2.6-1.5L14 2h-4l-.4 2.7a8 8 0 0 0-2.6 1.5l-2.4-.7-2 3.5 2 1.5a7.9 7.9 0 0 0 0 3l-2 1.5 2 3.5 2.4-.7a8 8 0 0 0 2.6 1.5L10 22h4l.4-2.7a8 8 0 0 0 2.6-1.5l2.4.7 2-3.5Z"/>'
  };

  function aplicarIconosNav() {
    document.querySelectorAll('.nav-item[data-vista]').forEach(function (btn) {
      var vista = btn.getAttribute('data-vista');
      var svg = ICONOS_NAV[vista];
      var icono = btn.querySelector('.nav-icon');
      if (svg && icono) {
        icono.innerHTML = '<svg aria-hidden="true" ' + _SVG_ATTR + '>' + svg + '</svg>';
      }
      // Nombre accesible propio: cuando el sidebar está colapsado, .nav-label
      // se oculta visualmente y el botón se quedaría sin texto para lectores
      // de pantalla si no fijamos aria-label aparte del tooltip visual.
      var tooltip = btn.getAttribute('data-tooltip');
      if (tooltip) btn.setAttribute('aria-label', tooltip);
    });
  }

  /** Oculta del menú los data-vista incluidos en `lista` (nombres de vista). */
  function aplicarModulosDesactivados(lista) {
    lista = lista || [];
    document.querySelectorAll('.nav-item[data-vista]').forEach(function (btn) {
      var vista = btn.getAttribute('data-vista');
      btn.classList.toggle('oculto', lista.indexOf(vista) !== -1);
    });
  }

  window.addEventListener('load', function () {
    ajustarShellGas();
    window.addEventListener('resize', ajustarShellGas);
    if (_leerStorage('local', 'rrhh-dark') === '1') {
      document.body.classList.add('dark');
      var btn = document.getElementById('btnDarkMode');
      if (btn) btn.textContent = '☀️';
    }
    if (_leerStorage('local', 'rrhh-sb-collapsed') === '1') {
      var sb = document.getElementById('sidebar');
      var btnC = document.getElementById('btnColapsar');
      if (sb) sb.classList.add('collapsed');
      if (btnC) btnC.title = 'Mostrar menú';
    }
    aplicarIconosNav();
    llamarBackend('obtenerModulosDesactivados', [], function (lista) { aplicarModulosDesactivados(lista); });
    mostrarVista('dashboard');
    iniciarSesionApp();
  });

  function iniciarSesionApp() {
    refrescarEmpleadosSelect(function () {
      SESSION_TOKEN = _leerStorage('session', 'rrhh-token');
      if (SESSION_TOKEN) {
        llamarBackend('renovarSesion', [SESSION_TOKEN], function (res) {
          if (res && res.ok && res.token) {
            guardarTokenSesion(res.token);
            establecerRol(res.rol);
          } else {
            mostrarModalPin();
          }
          actualizarBadge();
        });
      } else {
        actualizarBadge();
        mostrarModalPin();
      }
    });
  }

  function mostrarBannerAuth(visible) {
    var el = document.getElementById('bannerAuth');
    if (el) el.classList.toggle('oculto', !visible);
  }

  /** Detecta iframe de Google (URL Implementar) y ajusta clases CSS. */
  function ajustarShellGas() {
    var enShell = window.self !== window.top ||
      /userCodeAppPanel|script\.google\.com/i.test(window.location.href);
    document.documentElement.classList.toggle('gas-shell', enShell);
    document.body.classList.toggle('gas-shell', enShell);
  }

  // ── Navegación ────────────────────────────────────────────
  function mostrarVista(nombre) {
    document.querySelectorAll('.vista').forEach(function (v) { v.classList.add('oculto'); });
    document.getElementById('vista-' + nombre).classList.remove('oculto');
    document.querySelectorAll('.nav-item').forEach(function (b) {
      b.classList.toggle('activo', b.getAttribute('data-vista') === nombre);
    });
    var t = document.getElementById('topbarTitulo');
    if (t) t.textContent = TITULOS[nombre] || nombre;
    cerrarSidebar();
    if (CARGADORES[nombre]) CARGADORES[nombre]();
  }

  // ── Sidebar ───────────────────────────────────────────────
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('oculto');
  }
  function cerrarSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.add('oculto');
  }

  // ── Modo oscuro ───────────────────────────────────────────
  function toggleDarkMode() {
    var dark = document.body.classList.toggle('dark');
    _guardarStorage('local', 'rrhh-dark', dark ? '1' : '0');
    var btn = document.getElementById('btnDarkMode');
    if (btn) btn.textContent = dark ? '☀️' : '🌙';
  }

  // ── Badge de alertas ──────────────────────────────────────
  function actualizarBadge() {
    google.script.run
      .withSuccessHandler(function (res) {
        var badge = document.getElementById('badgeAlertas');
        if (!badge) return;
        if (res && res.total > 0) {
          badge.textContent = res.total;
          badge.classList.remove('oculto');
        } else {
          badge.classList.add('oculto');
        }
      })
      .withFailureHandler(function () {})
      .obtenerContadorAlertas();
  }

  // ── Roles / PIN ───────────────────────────────────────────
  function mostrarModalPin() {
    document.getElementById('modalPin').classList.remove('oculto');
    setTimeout(function () {
      var inp = document.getElementById('pinInput');
      if (inp) inp.focus();
    }, 100);
  }

  function cerrarModalPin() {
    document.getElementById('modalPin').classList.add('oculto');
    llamarBackend('verificarPIN', [''], function (res) {
      if (res && res.token) guardarTokenSesion(res.token);
      establecerRol((res && res.rol) ? res.rol : 'consulta');
    });
  }

  function verificarPinUI() {
    var pin = document.getElementById('pinInput').value;
    llamarBackend('verificarPIN', [pin], function (res) {
      if (!res.rol) {
        document.getElementById('pinError').textContent = res.mensaje || 'PIN incorrecto.';
        return;
      }
      document.getElementById('modalPin').classList.add('oculto');
      if (res.token) guardarTokenSesion(res.token);
      establecerRol(res.rol);
    });
  }

  function guardarTokenSesion(token) {
    SESSION_TOKEN = token || '';
    if (token) _guardarStorage('session', 'rrhh-token', token);
    else _quitarStorage('session', 'rrhh-token');
  }

  function establecerRol(rol) {
    ROL_ACTUAL = rol;
    var badge = document.getElementById('rolBadge');
    if (!badge) return;
    if (rol === 'consulta') {
      badge.textContent = '👁 Consulta';
      badge.className = 'rol-badge consulta';
    } else if (rol === 'rrhh') {
      badge.textContent = '✏️ RRHH';
      badge.className = 'rol-badge rrhh';
    } else {
      badge.textContent = '🔑 Admin';
      badge.className = 'rol-badge';
    }
    badge.classList.remove('oculto');
    badge.setAttribute('role', 'button');
    badge.setAttribute('tabindex', '0');
    badge.onkeydown = function (ev) {
      if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); badge.click(); }
    };
    badge.onclick = function () {
      if (confirm('¿Cambiar de usuario?')) {
        document.getElementById('pinInput').value = '';
        document.getElementById('pinError').textContent = '';
        guardarTokenSesion('');
        mostrarModalPin();
      }
    };
  }

  function puedeEditar() { return ROL_ACTUAL === 'rrhh' || ROL_ACTUAL === 'admin'; }
  function esAdmin()     { return ROL_ACTUAL === 'admin'; }

  // ── Indicador de carga ────────────────────────────────────
  function mostrarCargando(visible) {
    _cargandoCount += visible ? 1 : -1;
    if (_cargandoCount < 0) _cargandoCount = 0;
    document.getElementById('cargando').classList.toggle('oculto', _cargandoCount === 0);
  }

  // ── Mensajes ──────────────────────────────────────────────
  function mostrarMensaje(texto, tipo) {
    var div = document.getElementById('mensaje');
    div.textContent = texto;
    div.className = 'mensaje ' + tipo;
    div.classList.remove('oculto');
    clearTimeout(window._tmpMsg);
    window._tmpMsg = setTimeout(function () { div.classList.add('oculto'); }, 4000);
  }

  // ── Helpers de formato ────────────────────────────────────
  function escapar(txt) {
    return String(txt == null ? '' : txt)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function escaparAttr(txt) {
    return escapar(txt).replace(/`/g, '&#96;');
  }

  function formatoDinero(n) {
    var num = Number(n) || 0;
    return '₡' + num.toLocaleString('es', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── Gráficos Chart.js (Lib_Chart embebido) ─────────────────
  var _chartInst = {};

  function destruirChart(id) {
    if (_chartInst[id]) {
      _chartInst[id].destroy();
      delete _chartInst[id];
    }
  }

  function prepararCanvasGrafico(contenedorId) {
    var cont = document.getElementById(contenedorId);
    if (!cont) return null;
    destruirChart(contenedorId);
    cont.innerHTML = '';
    var canvas = document.createElement('canvas');
    cont.appendChild(canvas);
    return canvas;
  }

  var CHART_OPTS_BASE = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { family: 'Segoe UI', size: 12 } } } }
  };

  var _libsCargadas = {};

  function cargarLibreriaLocal(nombre, alListo) {
    if (_libsCargadas[nombre]) {
      alListo();
      return;
    }
    if (nombre === 'chart' && typeof Chart !== 'undefined') {
      _libsCargadas.chart = true;
      alListo();
      return;
    }
    if (nombre === 'xlsx' && typeof XLSX !== 'undefined') {
      _libsCargadas.xlsx = true;
      alListo();
      return;
    }
    if (nombre === 'jquery' && typeof jQuery !== 'undefined') {
      _libsCargadas.jquery = true;
      alListo();
      return;
    }
    if (nombre === 'select2' && typeof jQuery !== 'undefined' && jQuery.fn.select2) {
      _libsCargadas.select2 = true;
      alListo();
      return;
    }
    google.script.run
      .withSuccessHandler(function (html) {
        var m = html.match(/<script[^>]*>([\s\S]*)<\/script>/i);
        if (!m) {
          mostrarMensaje('No se pudo cargar la librería ' + nombre + '.', 'error');
          return;
        }
        var s = document.createElement('script');
        s.textContent = m[1];
        document.head.appendChild(s);
        _libsCargadas[nombre] = true;
        alListo();
      })
      .withFailureHandler(function (err) {
        mostrarMensaje('Error al cargar ' + nombre + ': ' + err.message, 'error');
        if (/auth|permiso|authorization|denied/i.test(err.message)) {
          mostrarBannerAuth(true);
        }
      })
      .obtenerScriptLibreria(nombre);
  }

  function badge(valor, clase) {
    return '<span class="badge ' + (clase || valor) + '">' + escapar(valor) + '</span>';
  }

  // ── Empleados select ──────────────────────────────────────
  function refrescarEmpleadosSelect(callback) {
    google.script.run
      .withSuccessHandler(function (lista) {
        EMPLEADOS_SELECT = lista || [];
        if (callback) callback();
      })
      .withFailureHandler(function () { if (callback) callback(); })
      .listarEmpleadosSelect();
  }

  function llenarSelectEmpleados(idSelect) {
    var sel = document.getElementById(idSelect);
    if (!sel) return;
    sel.innerHTML = '<option value="">— Selecciona —</option>';
    EMPLEADOS_SELECT.forEach(function (e) {
      var opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.nombre;
      sel.appendChild(opt);
    });
    aplicarSelect2(idSelect, 'Buscar empleado…');
  }

  function llenarSelectEmpleadosFiltro(idSelect) {
    var sel = document.getElementById(idSelect);
    if (!sel) return;
    var valActual = sel.value;
    sel.innerHTML = '<option value="">Todos los empleados</option>';
    EMPLEADOS_SELECT.forEach(function (e) {
      var opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.nombre;
      sel.appendChild(opt);
    });
    if (valActual) sel.value = valActual;
    aplicarSelect2(idSelect, 'Todos los empleados');
  }

  // ── Select2 (búsqueda dentro de los <select> de empleados) ─
  // jQuery/Select2 se cargan localmente bajo demanda (sin CDN, ver
  // Lib_Jquery.html / Lib_Select2.html) para no repetir los problemas
  // de carga que tuvo este proyecto antes con librerías por CDN.
  function cargarSelect2(alListo) {
    cargarLibreriaLocal('jquery', function () {
      cargarLibreriaLocal('select2', alListo);
    });
  }

  function aplicarSelect2(idSelect, placeholder) {
    cargarSelect2(function () {
      var $sel = jQuery('#' + idSelect);
      if (!$sel.length) return;
      if ($sel.hasClass('select2-hidden-accessible')) $sel.select2('destroy');
      $sel.select2({
        placeholder: placeholder || 'Selecciona…',
        allowClear: !$sel.prop('required') && !!$sel.find('option[value=""]').length,
        language: {
          noResults: function () { return 'Sin resultados.'; },
          searching: function () { return 'Buscando…'; }
        }
      });
    });
  }

  // ── Backend helper ────────────────────────────────────────
  function llamarBackend(fn, args, alExito) {
    mostrarCargando(true);
    args = (args || []).slice();
    if (fn !== 'verificarPIN' && fn !== 'renovarSesion') {
      args.push(SESSION_TOKEN || _leerStorage('session', 'rrhh-token'));
    }
    var runner = google.script.run
      .withSuccessHandler(function (res) {
        mostrarCargando(false);
        if (res && res.ok === false && res.mensaje && (
          res.mensaje.indexOf('Sesión') !== -1 || res.mensaje.indexOf('permisos') !== -1
        )) {
          mostrarMensaje(res.mensaje, 'error');
        }
        alExito(res);
      })
      .withFailureHandler(function (err) {
        mostrarCargando(false);
        var msg = err.message || String(err);
        if (/auth|permiso|authorization|ScriptError/i.test(msg)) {
          mostrarBannerAuth(true);
        }
        mostrarMensaje('Error: ' + msg, 'error');
      });
    runner[fn].apply(runner, args);
  }

  // ── Exportar a Excel (SheetJS bajo demanda) ───────────────
  function exportarTabla(tablaId, nombre) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) { mostrarMensaje('Tabla no encontrada.', 'error'); return; }
    cargarLibreriaLocal('xlsx', function () {
      if (typeof XLSX === 'undefined') {
        mostrarMensaje('La librería XLSX no está cargada.', 'error');
        return;
      }
      var clone = tabla.cloneNode(true);
      clone.querySelectorAll('.no-print').forEach(function (el) { el.remove(); });
      var wb = XLSX.utils.book_new();
      var ws = XLSX.utils.table_to_sheet(clone);
      XLSX.utils.book_append_sheet(wb, ws, nombre || 'Datos');
      XLSX.writeFile(wb, (nombre || 'datos') + '_' + new Date().toISOString().slice(0, 10) + '.xlsx');
    });
  }

  // ── Sidebar colapsable ────────────────────────────────────
  function toggleSidebarCollapse() {
    var sb  = document.getElementById('sidebar');
    var btn = document.getElementById('btnColapsar');
    var collapsed = sb.classList.toggle('collapsed');
    _guardarStorage('local', 'rrhh-sb-collapsed', collapsed ? '1' : '0');
    if (btn) btn.title = collapsed ? 'Mostrar menú' : 'Ocultar menú';
  }

  // ── Imprimir nómina ───────────────────────────────────────
  function imprimirNomina() { window.print(); }

  // ── Búsqueda global ───────────────────────────────────────
  var _busTimer = null;
  function busquedaGlobalUI(q) {
    clearTimeout(_busTimer);
    var dd = document.getElementById('searchDropdown');
    if (!q || q.trim().length < 2) { dd.classList.add('oculto'); dd.innerHTML = ''; return; }
    _busTimer = setTimeout(function () {
      llamarBackend('buscarGlobal', [q.trim()], function (res) {
        if (!res || !res.length) {
          dd.innerHTML = '<div class="sd-empty">Sin resultados para "'+escapar(q)+'"</div>';
          dd.classList.remove('oculto'); return;
        }
        dd.innerHTML = res.map(function (r) {
          var tipo = (r.entidad || r.tipo || '').toLowerCase();
          var ico = { empleado:'👤', departamento:'🏢', capacitacion:'📚', activo:'💻' }[tipo] || '🔍';
          return '<div class="sd-item" onclick="irAResultado(\''+escaparAttr(r.vista||tipo)+'\',\''+escaparAttr(r.id)+'\')">'+
            '<span class="sd-ico">'+ico+'</span>'+
            '<span class="sd-txt"><strong>'+escapar(r.titulo||r.nombre)+'</strong><span class="sd-sub">'+escapar(r.subtitulo||r.subtexto||tipo)+'</span></span>'+
          '</div>';
        }).join('');
        dd.classList.remove('oculto');
      });
    }, 300);
  }

  function irAResultado(vista, id) {
    document.getElementById('searchDropdown').classList.add('oculto');
    document.getElementById('busquedaGlobal').value = '';
    mostrarVista(vista || 'empleados');
    window._resultadoBusquedaId = id || '';
  }

  document.addEventListener('click', function (e) {
    var dd = document.getElementById('searchDropdown');
    if (dd && !dd.contains(e.target) && e.target.id !== 'busquedaGlobal') dd.classList.add('oculto');
  });

  // ── Paginación ────────────────────────────────────────────
  function paginarTabla(tablaId, pagActual, porPagina) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) return;
    var filas = tabla.querySelectorAll('tbody tr:not(.fila-total)');
    var total = filas.length;
    var inicio = (pagActual - 1) * porPagina;
    var fin    = inicio + porPagina;
    filas.forEach(function (f, i) {
      f.style.display = (i >= inicio && i < fin) ? '' : 'none';
    });
    return { total: total, paginas: Math.ceil(total / porPagina) };
  }

  function renderPaginacion(contId, pagActual, totalPag, onCambio) {
    var cont = document.getElementById(contId);
    if (!cont || totalPag <= 1) { if (cont) cont.innerHTML = ''; return; }
    var html = '';
    html += '<button class="btn-pag" '+(pagActual===1?'disabled':'')+' onclick="('+onCambio+')('+Math.max(1,pagActual-1)+')">‹</button>';
    for (var i = 1; i <= totalPag; i++) {
      if (totalPag > 7 && i > 2 && i < totalPag-1 && Math.abs(i-pagActual) > 1) {
        if (i === 3 || i === totalPag-2) html += '<span class="pag-dots">…</span>';
        continue;
      }
      html += '<button class="btn-pag'+(i===pagActual?' activo':'')+'" onclick="('+onCambio+')('+i+')">'+i+'</button>';
    }
    html += '<button class="btn-pag" '+(pagActual===totalPag?'disabled':'')+' onclick="('+onCambio+')('+Math.min(totalPag,pagActual+1)+')">›</button>';
    cont.innerHTML = html;
  }

  // ── Ordenar columnas ──────────────────────────────────────
  var _sortEstado = {};

  function ordenarTabla(tablaId, colIdx) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) return;
    var key = tablaId + '_' + colIdx;
    var asc = _sortEstado[key] !== true;
    _sortEstado[key] = asc;

    var tbody = tabla.querySelector('tbody');
    var filas = Array.prototype.slice.call(tbody.querySelectorAll('tr:not(.fila-total)'));
    var esFechaISO = /^\d{4}-\d{2}-\d{2}/;
    filas.sort(function (a, b) {
      var va = ((a.cells[colIdx] || {}).textContent || '').trim();
      var vb = ((b.cells[colIdx] || {}).textContent || '').trim();
      // Fechas yyyy-MM-dd: comparar como texto ISO, no extraer solo dígitos
      // (si no, "2026-07-03" se leería como el número 2026, perdiendo mes/día).
      if (esFechaISO.test(va) && esFechaISO.test(vb)) {
        return asc ? va.localeCompare(vb) : vb.localeCompare(va);
      }
      var na = parseFloat(va.replace(/[^\d.-]/g,''));
      var nb = parseFloat(vb.replace(/[^\d.-]/g,''));
      if (!isNaN(na) && !isNaN(nb)) return asc ? na-nb : nb-na;
      return asc ? va.localeCompare(vb, 'es') : vb.localeCompare(va, 'es');
    });
    filas.forEach(function (f) { tbody.appendChild(f); });

    // Indicadores visuales
    tabla.querySelectorAll('thead th').forEach(function (th, i) {
      th.classList.remove('sort-asc', 'sort-desc');
      if (i === colIdx) th.classList.add(asc ? 'sort-asc' : 'sort-desc');
    });
  }

  function hacerOrdenable(tablaId) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) return;
    tabla.querySelectorAll('thead th').forEach(function (th, i) {
      th.style.cursor = 'pointer';
      th.title = 'Haz clic para ordenar';
      th.onclick = function () { ordenarTabla(tablaId, i); };
    });
  }

  // Select2 fue removido - usa select HTML nativo
</script>
