<script>
  /* ============================================================
     FUNCIONES COMUNES — v10
     Navegación · Mensajes · Formato · Dark mode · Export · Roles
     Búsqueda global · Paginación · Orden de columnas
     ============================================================ */

  var EMPLEADOS_SELECT = [];
  var ROL_ACTUAL = 'consulta'; // 'consulta' | 'rrhh' | 'admin'

  var CARGADORES = {
    dashboard:      function () { cargarDashboard(); },
    empleados:      function () { cargarEmpleados(); },
    departamentos:  function () { cargarDepartamentos(); },
    asistencia:     function () { cargarAsistencia(); },
    vacaciones:     function () { cargarVacaciones(); },
    nomina:         function () { cargarNomina(); },
    reportes:       function () { cargarReportes(); },
    alertas:        function () { cargarAlertas(); },
    configuracion:  function () { cargarConfiguracion(); },
    capacitaciones: function () { cargarCapacitaciones(); },
    evaluaciones:   function () { cargarEvaluaciones(); },
    documentos:     function () { cargarDocumentos(); },
    bitacora:       function () { cargarBitacora(); },
    prestamos:      function () { cargarPrestamos(); },
    horasextra:     function () { cargarHorasExtra(); },
    activos:        function () { cargarActivos(); },
    turnos:         function () { cargarTurnos(); },
    expediente:     function () { cargarExpediente(); },
    calendario:     function () { cargarCalendario(); },
    organigrama:    function () { cargarOrganigrama(); },
    incapacidades:  function () { cargarIncapacidades(); },
    feriados:       function () { cargarFeriados(); },
    liquidaciones:  function () { cargarLiquidaciones(); }
  };

  var TITULOS = {
    dashboard:      'Dashboard',
    empleados:      'Empleados',
    departamentos:  'Departamentos',
    asistencia:     'Asistencia',
    vacaciones:     'Vacaciones',
    nomina:         'Nómina',
    reportes:       'Reportes',
    alertas:        'Alertas',
    configuracion:  'Configuración',
    capacitaciones: 'Capacitaciones',
    evaluaciones:   'Evaluaciones de desempeño',
    documentos:     'Documentos',
    bitacora:       'Bitácora de cambios',
    prestamos:      'Préstamos a empleados',
    horasextra:     'Horas extra',
    activos:        'Activos asignados',
    turnos:         'Gestión de turnos',
    expediente:     'Expediente 360°',
    calendario:     'Calendario de eventos',
    organigrama:    'Organigrama',
    incapacidades:  'Incapacidades CCSS / INS',
    feriados:       'Feriados',
    liquidaciones:  'Liquidaciones laborales'
  };

  window.addEventListener('load', function () {
    // Restaurar dark mode preferido
    if (localStorage.getItem('rrhh-dark') === '1') {
      document.body.classList.add('dark');
      var btn = document.getElementById('btnDarkMode');
      if (btn) btn.textContent = '☀️';
    }
    // Restaurar sidebar colapsado
    if (localStorage.getItem('rrhh-sb-collapsed') === '1') {
      var sb = document.getElementById('sidebar');
      var btnC = document.getElementById('btnColapsar');
      if (sb) sb.classList.add('collapsed');
      if (btnC) btnC.title = 'Mostrar menú';
    }
    refrescarEmpleadosSelect(function () {
      mostrarVista('dashboard');
      actualizarBadge();
      mostrarModalPin();
    });
  });

  // ── Navegación ────────────────────────────────────────────
  function mostrarVista(nombre) {
    document.querySelectorAll('.vista').forEach(function (v) { v.classList.add('oculto'); });
    document.getElementById('vista-' + nombre).classList.remove('oculto');
    document.querySelectorAll('.nav-item').forEach(function (b) {
      b.classList.toggle('activo', b.getAttribute('data-vista') === nombre);
    });
    var t = document.getElementById('topbarTitulo');
    if (t) t.textContent = TITULOS[nombre] || nombre;
    cerrarSidebar();
    if (CARGADORES[nombre]) CARGADORES[nombre]();
  }

  // ── Sidebar ───────────────────────────────────────────────
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('oculto');
  }
  function cerrarSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.add('oculto');
  }

  // ── Modo oscuro ───────────────────────────────────────────
  function toggleDarkMode() {
    var dark = document.body.classList.toggle('dark');
    localStorage.setItem('rrhh-dark', dark ? '1' : '0');
    var btn = document.getElementById('btnDarkMode');
    if (btn) btn.textContent = dark ? '☀️' : '🌙';
  }

  // ── Badge de alertas ──────────────────────────────────────
  function actualizarBadge() {
    google.script.run
      .withSuccessHandler(function (res) {
        var badge = document.getElementById('badgeAlertas');
        if (!badge) return;
        if (res && res.total > 0) {
          badge.textContent = res.total;
          badge.classList.remove('oculto');
        } else {
          badge.classList.add('oculto');
        }
      })
      .withFailureHandler(function () {})
      .obtenerContadorAlertas();
  }

  // ── Roles / PIN ───────────────────────────────────────────
  function mostrarModalPin() {
    document.getElementById('modalPin').classList.remove('oculto');
    setTimeout(function () {
      var inp = document.getElementById('pinInput');
      if (inp) inp.focus();
    }, 100);
  }

  function cerrarModalPin() {
    document.getElementById('modalPin').classList.add('oculto');
    establecerRol('consulta');
  }

  function verificarPinUI() {
    var pin = document.getElementById('pinInput').value;
    llamarBackend('verificarPIN', [pin], function (res) {
      if (!res.rol) {
        document.getElementById('pinError').textContent = res.mensaje || 'PIN incorrecto.';
        return;
      }
      document.getElementById('modalPin').classList.add('oculto');
      establecerRol(res.rol);
    });
  }

  function establecerRol(rol) {
    ROL_ACTUAL = rol;
    var badge = document.getElementById('rolBadge');
    if (!badge) return;
    if (rol === 'consulta') {
      badge.textContent = '👁 Consulta';
      badge.className = 'rol-badge consulta';
    } else if (rol === 'rrhh') {
      badge.textContent = '✏️ RRHH';
      badge.className = 'rol-badge rrhh';
    } else {
      badge.textContent = '🔑 Admin';
      badge.className = 'rol-badge';
    }
    badge.classList.remove('oculto');
    badge.onclick = function () {
      if (confirm('¿Cambiar de usuario?')) {
        document.getElementById('pinInput').value = '';
        document.getElementById('pinError').textContent = '';
        mostrarModalPin();
      }
    };
  }

  function puedeEditar() { return ROL_ACTUAL === 'rrhh' || ROL_ACTUAL === 'admin'; }
  function esAdmin()     { return ROL_ACTUAL === 'admin'; }

  // ── Indicador de carga ────────────────────────────────────
  function mostrarCargando(visible) {
    document.getElementById('cargando').classList.toggle('oculto', !visible);
  }

  // ── Mensajes ──────────────────────────────────────────────
  function mostrarMensaje(texto, tipo) {
    var div = document.getElementById('mensaje');
    div.textContent = texto;
    div.className = 'mensaje ' + tipo;
    div.classList.remove('oculto');
    clearTimeout(window._tmpMsg);
    window._tmpMsg = setTimeout(function () { div.classList.add('oculto'); }, 4000);
  }

  // ── Helpers de formato ────────────────────────────────────
  function escapar(txt) {
    return String(txt == null ? '' : txt)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatoDinero(n) {
    var num = Number(n) || 0;
    return '₡' + num.toLocaleString('es', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function badge(valor, clase) {
    return '<span class="badge ' + (clase || valor) + '">' + escapar(valor) + '</span>';
  }

  // ── Empleados select ──────────────────────────────────────
  function refrescarEmpleadosSelect(callback) {
    google.script.run
      .withSuccessHandler(function (lista) {
        EMPLEADOS_SELECT = lista || [];
        if (callback) callback();
      })
      .withFailureHandler(function () { if (callback) callback(); })
      .listarEmpleadosSelect();
  }

  function llenarSelectEmpleados(idSelect) {
    var sel = document.getElementById(idSelect);
    if (!sel) return;
    sel.innerHTML = '<option value="">— Selecciona —</option>';
    EMPLEADOS_SELECT.forEach(function (e) {
      var opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.nombre;
      sel.appendChild(opt);
    });
  }

  function llenarSelectEmpleadosFiltro(idSelect) {
    var sel = document.getElementById(idSelect);
    if (!sel) return;
    var valActual = sel.value;
    sel.innerHTML = '<option value="">Todos los empleados</option>';
    EMPLEADOS_SELECT.forEach(function (e) {
      var opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.nombre;
      sel.appendChild(opt);
    });
    if (valActual) sel.value = valActual;
  }

  // ── Backend helper ────────────────────────────────────────
  function llamarBackend(fn, args, alExito) {
    mostrarCargando(true);
    var runner = google.script.run
      .withSuccessHandler(function (res) {
        mostrarCargando(false);
        alExito(res);
      })
      .withFailureHandler(function (err) {
        mostrarCargando(false);
        mostrarMensaje('Error: ' + err.message, 'error');
      });
    runner[fn].apply(runner, args || []);
  }

  // ── Exportar a Excel (SheetJS) ────────────────────────────
  function exportarTabla(tablaId, nombre) {
    if (typeof XLSX === 'undefined') {
      mostrarMensaje('La librería XLSX no está cargada.', 'error');
      return;
    }
    var tabla = document.getElementById(tablaId);
    if (!tabla) { mostrarMensaje('Tabla no encontrada.', 'error'); return; }
    // Clonar sin columnas no-print (Acciones)
    var clone = tabla.cloneNode(true);
    clone.querySelectorAll('.no-print').forEach(function (el) { el.remove(); });
    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.table_to_sheet(clone);
    XLSX.utils.book_append_sheet(wb, ws, nombre || 'Datos');
    XLSX.writeFile(wb, (nombre || 'datos') + '_' + new Date().toISOString().slice(0,10) + '.xlsx');
  }

  // ── Sidebar colapsable ────────────────────────────────────
  function toggleSidebarCollapse() {
    var sb  = document.getElementById('sidebar');
    var btn = document.getElementById('btnColapsar');
    var collapsed = sb.classList.toggle('collapsed');
    localStorage.setItem('rrhh-sb-collapsed', collapsed ? '1' : '0');
    if (btn) btn.title = collapsed ? 'Mostrar menú' : 'Ocultar menú';
  }

  // ── Imprimir nómina ───────────────────────────────────────
  function imprimirNomina() { window.print(); }

  // ── Búsqueda global ───────────────────────────────────────
  var _busTimer = null;
  function busquedaGlobalUI(q) {
    clearTimeout(_busTimer);
    var dd = document.getElementById('searchDropdown');
    if (!q || q.trim().length < 2) { dd.classList.add('oculto'); dd.innerHTML = ''; return; }
    _busTimer = setTimeout(function () {
      llamarBackend('buscarGlobal', [q.trim()], function (res) {
        if (!res || !res.length) {
          dd.innerHTML = '<div class="sd-empty">Sin resultados para "'+escapar(q)+'"</div>';
          dd.classList.remove('oculto'); return;
        }
        dd.innerHTML = res.map(function (r) {
          var ico = { empleado:'👤', departamento:'🏢', capacitacion:'📚', activo:'💻' }[r.tipo] || '🔍';
          return '<div class="sd-item" onclick="irAResultado(\''+escapar(r.tipo)+'\',\''+escapar(r.id)+'\')">'+
            '<span class="sd-ico">'+ico+'</span>'+
            '<span class="sd-txt"><strong>'+escapar(r.nombre)+'</strong><span class="sd-sub">'+escapar(r.subtexto||r.tipo)+'</span></span>'+
          '</div>';
        }).join('');
        dd.classList.remove('oculto');
      });
    }, 300);
  }

  function irAResultado(tipo, id) {
    var destino = { empleado:'empleados', departamento:'departamentos', capacitacion:'capacitaciones', activo:'activos' }[tipo] || 'empleados';
    document.getElementById('searchDropdown').classList.add('oculto');
    document.getElementById('busquedaGlobal').value = '';
    mostrarVista(destino);
  }

  document.addEventListener('click', function (e) {
    var dd = document.getElementById('searchDropdown');
    if (dd && !dd.contains(e.target) && e.target.id !== 'busquedaGlobal') dd.classList.add('oculto');
  });

  // ── Paginación ────────────────────────────────────────────
  function paginarTabla(tablaId, pagActual, porPagina) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) return;
    var filas = tabla.querySelectorAll('tbody tr:not(.fila-total)');
    var total = filas.length;
    var inicio = (pagActual - 1) * porPagina;
    var fin    = inicio + porPagina;
    filas.forEach(function (f, i) {
      f.style.display = (i >= inicio && i < fin) ? '' : 'none';
    });
    return { total: total, paginas: Math.ceil(total / porPagina) };
  }

  function renderPaginacion(contId, pagActual, totalPag, onCambio) {
    var cont = document.getElementById(contId);
    if (!cont || totalPag <= 1) { if (cont) cont.innerHTML = ''; return; }
    var html = '';
    html += '<button class="btn-pag" '+(pagActual===1?'disabled':'')+' onclick="('+onCambio+')('+Math.max(1,pagActual-1)+')">‹</button>';
    for (var i = 1; i <= totalPag; i++) {
      if (totalPag > 7 && i > 2 && i < totalPag-1 && Math.abs(i-pagActual) > 1) {
        if (i === 3 || i === totalPag-2) html += '<span class="pag-dots">…</span>';
        continue;
      }
      html += '<button class="btn-pag'+(i===pagActual?' activo':'')+'" onclick="('+onCambio+')('+i+')">'+i+'</button>';
    }
    html += '<button class="btn-pag" '+(pagActual===totalPag?'disabled':'')+' onclick="('+onCambio+')('+Math.min(totalPag,pagActual+1)+')">›</button>';
    cont.innerHTML = html;
  }

  // ── Ordenar columnas ──────────────────────────────────────
  var _sortEstado = {};

  function ordenarTabla(tablaId, colIdx) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) return;
    var key = tablaId + '_' + colIdx;
    var asc = _sortEstado[key] !== true;
    _sortEstado[key] = asc;

    var tbody = tabla.querySelector('tbody');
    var filas = Array.prototype.slice.call(tbody.querySelectorAll('tr:not(.fila-total)'));
    filas.sort(function (a, b) {
      var va = (a.cells[colIdx] || {}).textContent || '';
      var vb = (b.cells[colIdx] || {}).textContent || '';
      var na = parseFloat(va.replace(/[^\d.-]/g,''));
      var nb = parseFloat(vb.replace(/[^\d.-]/g,''));
      if (!isNaN(na) && !isNaN(nb)) return asc ? na-nb : nb-na;
      return asc ? va.localeCompare(vb, 'es') : vb.localeCompare(va, 'es');
    });
    filas.forEach(function (f) { tbody.appendChild(f); });

    // Indicadores visuales
    tabla.querySelectorAll('thead th').forEach(function (th, i) {
      th.classList.remove('sort-asc', 'sort-desc');
      if (i === colIdx) th.classList.add(asc ? 'sort-asc' : 'sort-desc');
    });
  }

  function hacerOrdenable(tablaId) {
    var tabla = document.getElementById(tablaId);
    if (!tabla) return;
    tabla.querySelectorAll('thead th').forEach(function (th, i) {
      th.style.cursor = 'pointer';
      th.title = 'Haz clic para ordenar';
      th.onclick = function () { ordenarTabla(tablaId, i); };
    });
  }

  // ── Select2 initialization ────────────────────────────────────
  /**
   * Inicializa Select2 en todos los selects con busca y mejor UX.
   * Se ejecuta automáticamente después de cargar cada vista.
   */
  function inicializarSelect2() {
    if (typeof $ === 'undefined' || !$.fn.select2) return;

    // Select simple (empleado, departamento, etc)
    $('select').not('.select2-hidden-accessible').select2({
      language: 'es',
      placeholder: 'Selecciona una opción...',
      allowClear: true,
      width: '100%',
      minimumInputLength: 0,
      templateResult: function (data) {
        if (!data.id) return data.text;
        return $('<span>' + escapar(data.text) + '</span>');
      },
      templateSelection: function (data) {
        if (!data.id) return data.text;
        return escapar(data.text);
      },
      matcher: function (params, data) {
        if ($.trim(params.term) === '') return data;
        var term = params.term.toLowerCase();
        var text = data.text.toLowerCase();
        if (text.indexOf(term) > -1) return data;
        return null;
      }
    });

    // Aplicar Select2 a los que ya están inicializados
    $('.select2-hidden-accessible').each(function () {
      $(this).select2({
        language: 'es',
        placeholder: 'Selecciona una opción...',
        allowClear: true,
        width: '100%'
      });
    });
  }

  // Inicializar Select2 después de cargar cada vista
  var originalCargadores = Object.assign({}, CARGADORES);
  Object.keys(CARGADORES).forEach(function (vista) {
    var original = CARGADORES[vista];
    CARGADORES[vista] = function () {
      original();
      setTimeout(inicializarSelect2, 100);
    };
  });
</script>
