<script>
  /* ============================================================
     MÓDULO LIQUIDACIONES LABORALES — v11
     ============================================================ */
  var LIQUIDACIONES = [];

  function cargarLiquidaciones() {
    llenarSelectEmpleadosFiltro('filtroEmpLiq');
    var empId = (document.getElementById('filtroEmpLiq')||{}).value || '';
    var estado = (document.getElementById('filtroEstadoLiq')||{}).value || '';
    llamarBackend('listarLiquidaciones', [empId||null, estado||null], function(lista) {
      LIQUIDACIONES = lista || [];
      _pintarLiquidaciones();
    });
  }

  function _pintarLiquidaciones() {
    var cuerpo = document.getElementById('cuerpoLiquidaciones');
    cuerpo.innerHTML = '';
    document.getElementById('sinLiquidaciones').classList.toggle('oculto', LIQUIDACIONES.length > 0);
    LIQUIDACIONES.forEach(function(liq) {
      var esPagada = String(liq.estado||'').toLowerCase() === 'pagada';
      var acciones =
        '<button class="btn-mini" onclick="verDetallesLiquidacion(\''+escaparAttr(liq.empleado_id)+'\',\''+escaparAttr(liq.fecha_salida)+'\')">📋 Detalles</button>';
      if (puedeEditar()) {
        acciones +=
          (esPagada ? '' : '<button class="btn-mini" onclick="pagarLiquidacion(\''+escaparAttr(liq.id)+'\')">✓ Pagada</button>') +
          '<button class="btn-mini" onclick="editarLiquidacion(\''+escaparAttr(liq.id)+'\')">Editar</button>' +
          '<button class="btn-mini peligro" onclick="eliminarLiquidacionUI(\''+escaparAttr(liq.id)+'\')">Eliminar</button>';
      }
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>'+escapar(liq.empleado_nombre)+'</td>'+
        '<td>'+escapar(liq.fecha_ingreso)+'</td>'+
        '<td>'+escapar(liq.fecha_salida)+'</td>'+
        '<td>'+escapar(liq.anios_trabajados)+'</td>'+
        '<td>'+formatoDinero(liq.monto)+'</td>'+
        '<td>'+badge(liq.estado||'pendiente', esPagada ? 'activo' : 'pendiente')+'</td>'+
        '<td class="no-print">'+acciones+'</td>';
      cuerpo.appendChild(tr);
    });
  }

  function verDetallesLiquidacion(empleadoId, fechaSalida) {
    var motivo = prompt('Motivo de salida:\n1 = Renuncia\n2 = Despido con responsabilidad\n3 = Despido sin responsabilidad', '1');
    var motivoMap = { '1': 'renuncia', '2': 'despido_con_resp', '3': 'despido_sin_resp' };
    var motivoSalida = motivoMap[motivo] || 'renuncia';

    llamarBackend('calcularLiquidacion', [empleadoId, fechaSalida, motivoSalida], function(res) {
      if (!res.ok) { mostrarMensaje(res.mensaje, 'error'); return; }
      _mostrarModalDetallesLiquidacion(res);
    });
  }

  function _mostrarModalDetallesLiquidacion(liq) {
    var html = '<div style="overflow-y:auto;max-height:80vh;padding:12px;font-family:Arial,sans-serif;font-size:13px">';

    // Encabezado empresa
    html += '<div style="text-align:center;margin-bottom:16px;border-bottom:2px solid #333;padding-bottom:8px">';
    html += '<strong style="font-size:16px">TROPICALES DEL VALLE S.A.</strong><br>';
    html += '<strong>Liquidación Laboral</strong>';
    html += '</div>';

    // Datos del trabajador
    html += '<div style="margin-bottom:12px">';
    html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<tr><td><strong>Nombre del Trabajador:</strong></td><td>'+escapar(liq.empleado)+'</td><td style="text-align:right"><strong>Identificación nº</strong></td><td style="text-align:right">'+escapar(liq.identificacion)+'</td></tr>';
    html += '<tr><td><strong>Fecha Inicio:</strong></td><td>'+escapar(liq.fechaIngreso)+'</td><td style="text-align:right"><strong>Fecha Salida:</strong></td><td style="text-align:right">'+escapar(liq.fechaSalida)+'</td></tr>';
    html += '<tr><td><strong>Meses Laborados:</strong></td><td>'+liq.mesesLaborados+','+String(liq.diasAdicionales).padStart(2,'0')+'</td><td style="text-align:right"><strong>Tipo de nómina:</strong></td><td style="text-align:right">'+escapar(liq.tipoNomina)+'</td></tr>';
    html += '</table>';
    html += '</div>';

    // Concepto 1: Aguinaldo
    html += '<div style="margin:12px 0;border-left:3px solid var(--p);padding-left:8px">';
    html += '<strong>1- Cálculo del Aguinaldo:</strong><br>';
    html += '<table style="width:100%;margin-top:4px">';
    html += '<tr><td>Total Por Aguinaldo:</td><td style="text-align:right"><strong>'+formatoDinero(liq.aguinaldo)+'</strong></td></tr>';
    html += '</table>';
    html += '</div>';

    // Concepto 2: Vacaciones
    html += '<div style="margin:12px 0;border-left:3px solid var(--ok);padding-left:8px">';
    html += '<strong>2- Cálculo de las Vacaciones:</strong><br>';
    html += '<table style="width:100%;margin-top:4px;font-size:12px">';
    html += '<tr><td>Salario Promedio Mensual:</td><td style="text-align:right">'+formatoDinero(liq.salarioMensual)+'</td></tr>';
    html += '<tr><td>Salario por Día:</td><td style="text-align:right">'+formatoDinero(liq.salarioDiario)+'</td></tr>';
    html += '<tr><td>Días a Recibir Vacaciones:</td><td style="text-align:right">5,00</td></tr>';
    html += '<tr style="border-top:1px solid var(--border)"><td><strong>Total Por Vacaciones:</strong></td><td style="text-align:right"><strong>'+formatoDinero(liq.vacaciones)+'</strong></td></tr>';
    html += '</table>';
    html += '</div>';

    // Concepto 3: Cesantía
    html += '<div style="margin:12px 0;border-left:3px solid '+(liq.cesantia > 0 ? 'var(--ok)' : 'var(--txt-3)')+';padding-left:8px">';
    html += '<strong>3- Calculo de la Cesantia:</strong><br>';
    html += '<table style="width:100%;margin-top:4px;font-size:12px">';
    html += '<tr><td>¿Corresponde el pago?:</td><td style="text-align:right">'+(liq.cesantia > 0 ? '<span style="color:var(--ok)">SÍ</span>' : '<span style="color:var(--warn)">NO</span>')+'</td></tr>';
    html += '<tr style="border-top:1px solid var(--border)"><td><strong>Total Por Auxilio de Cesantia:</strong></td><td style="text-align:right"><strong>'+formatoDinero(liq.cesantia)+'</strong></td></tr>';
    html += '</table>';
    html += '</div>';

    // Concepto 4: Preaviso
    html += '<div style="margin:12px 0;border-left:3px solid '+(liq.preaviso > 0 ? 'var(--ok)' : 'var(--txt-3)')+';padding-left:8px">';
    html += '<strong>4- Calculo del Preaviso:</strong><br>';
    html += '<table style="width:100%;margin-top:4px;font-size:12px">';
    html += '<tr><td>¿Corresponde el pago?:</td><td style="text-align:right">'+(liq.preaviso > 0 ? '<span style="color:var(--ok)">SÍ</span>' : '<span style="color:var(--warn)">NO</span>')+'</td></tr>';
    html += '<tr style="border-top:1px solid var(--border)"><td><strong>Total Por Preaviso:</strong></td><td style="text-align:right"><strong>'+formatoDinero(liq.preaviso)+'</strong></td></tr>';
    html += '</table>';
    html += '</div>';

    // TOTAL PRESTACIONES
    html += '<div style="margin:16px 0;background:var(--ok-bg);padding:12px;border-radius:6px;border-left:4px solid var(--ok)">';
    html += '<table style="width:100%">';
    html += '<tr><td><strong>Total Prestaciones Laborales:</strong></td><td style="text-align:right;font-size:16px;font-weight:700;color:var(--ok)">'+formatoDinero(liq.totalPrestaciones)+'</td></tr>';
    html += '</table>';
    html += '</div>';

    // Descuentos
    if (liq.descuentoCCSS > 0) {
      html += '<div style="margin:12px 0;background:var(--err-bg);padding:8px;border-radius:4px;font-size:12px">';
      html += '<strong>Descuentos:</strong><br>';
      html += 'CCSS (9.15%): -'+formatoDinero(liq.descuentoCCSS);
      html += '</div>';
    }

    // TOTAL NETO FINAL
    html += '<div style="margin:16px 0;background:linear-gradient(135deg, var(--ok-bg), var(--surface-2));padding:16px;border-radius:8px;border:2px solid var(--ok);text-align:center">';
    html += '<div style="color:var(--txt-2);font-size:11px;margin-bottom:6px;text-transform:uppercase">Monto Final Liquidación</div>';
    html += '<div style="font-size:24px;font-weight:700;color:var(--ok)">'+formatoDinero(liq.totalNeto)+'</div>';
    html += '</div>';

    html += '</div>';

    var modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = '<div class="modal-contenido" style="max-width:600px;max-height:90vh;overflow-y:auto"><div class="modal-cabecera"><h2>📋 Liquidación Laboral Detallada</h2><button class="cerrar" onclick="this.closest(\'.modal\').remove()">&times;</button></div>'+html+'</div>';
    document.body.appendChild(modal);
  }

  function abrirFormLiquidacion() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    document.getElementById('formLiquidacion').reset();
    document.getElementById('liqId').value = '';
    document.getElementById('liqFechaCalculo').value = new Date().toISOString().slice(0,10);
    document.getElementById('modalLiqTitulo').textContent = 'Nueva liquidación';
    document.getElementById('liqInactivarWrap').style.display = '';
    llenarSelectEmpleados('liqEmpleado');
    document.getElementById('modalLiquidacion').classList.remove('oculto');
  }

  function editarLiquidacion(id) {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    var liq = LIQUIDACIONES.filter(function(l) { return String(l.id) === String(id); })[0];
    if (!liq) return;
    llenarSelectEmpleados('liqEmpleado');
    document.getElementById('liqId').value = liq.id;
    document.getElementById('liqEmpleado').value = liq.empleado_id;
    document.getElementById('liqFechaSalida').value = liq.fecha_salida;
    document.getElementById('liqMotivo').value = liq.motivo || 'Renuncia';
    document.getElementById('liqFechaCalculo').value = liq.fecha_calculo || '';
    document.getElementById('liqMonto').value = liq.monto;
    document.getElementById('liqEstado').value = liq.estado || 'pendiente';
    document.getElementById('liqNotas').value = liq.notas || '';
    document.getElementById('liqInactivar').checked = false;
    document.getElementById('liqInactivarWrap').style.display = 'none';
    document.getElementById('modalLiqTitulo').textContent = 'Editar liquidación';
    document.getElementById('modalLiquidacion').classList.remove('oculto');
  }

  function cerrarModalLiquidacion() { document.getElementById('modalLiquidacion').classList.add('oculto'); }

  function guardarLiquidacion(e) {
    e.preventDefault();
    var datos = {
      id: document.getElementById('liqId').value,
      empleado_id: document.getElementById('liqEmpleado').value,
      fecha_salida: document.getElementById('liqFechaSalida').value,
      motivo: document.getElementById('liqMotivo').value,
      fecha_calculo: document.getElementById('liqFechaCalculo').value,
      monto: document.getElementById('liqMonto').value,
      estado: document.getElementById('liqEstado').value,
      notas: document.getElementById('liqNotas').value,
      inactivar: document.getElementById('liqInactivar').checked
    };
    if (!datos.empleado_id) { mostrarMensaje('Selecciona un empleado.', 'error'); return; }
    var fn = datos.id ? 'actualizarLiquidacion' : 'crearLiquidacion';
    llamarBackend(fn, [datos], function(res) {
      if (res.ok) {
        cerrarModalLiquidacion();
        mostrarMensaje(res.mensaje,'exito');
        cargarLiquidaciones();
        if (datos.inactivar) refrescarEmpleadosSelect();
      } else mostrarMensaje(res.mensaje,'error');
    });
  }

  function pagarLiquidacion(id) {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    if (!confirm('¿Marcar esta liquidación como pagada?')) return;
    llamarBackend('marcarLiquidacionPagada', [id], function(res) {
      mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
      if (res.ok) cargarLiquidaciones();
    });
  }

  function eliminarLiquidacionUI(id) {
    if (!confirm('¿Eliminar esta liquidación?')) return;
    llamarBackend('eliminarLiquidacion', [id], function(res) {
      mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
      if (res.ok) cargarLiquidaciones();
    });
  }
</script>
