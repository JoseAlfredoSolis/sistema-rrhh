<script>
  /* ============================================================
     MÓDULO COMUNICACIONES — v2
     Plantillas de correo/WhatsApp + envío por uno o ambos medios + historial.
     ============================================================ */

  var PLANTILLAS_CACHE = [];

  function cargarComunicaciones() {
    llenarSelectEmpleados('comEmpleado');
    cambiarCanalesComunicacion();
    llamarBackend('listarPlantillas', [null], function (lista) {
      if (lista && lista.ok === false) { mostrarMensaje(lista.mensaje, 'error'); lista = []; }
      PLANTILLAS_CACHE = lista || [];
      _pintarPlantillas();
      _llenarSelectPlantillasEmail();
      _llenarSelectPlantillasWhatsapp();
    });
    _cargarHistorialComunicaciones();
  }

  function _cargarHistorialComunicaciones() {
    var tipo = (document.getElementById('filtroTipoHistorial') || {}).value || null;
    llamarBackend('listarComunicaciones', [null, tipo], function (lista) {
      if (lista && lista.ok === false) {
        mostrarMensaje(lista.mensaje, 'error');
        lista = [];
      }
      var cuerpo = document.getElementById('cuerpoComunicaciones');
      cuerpo.innerHTML = '';
      document.getElementById('sinComunicaciones').classList.toggle('oculto', (lista || []).length > 0);
      (lista || []).forEach(function (r) {
        var icono = r.tipo === 'whatsapp' ? '💬' : '📧';
        var fallo = String(r.estado).toLowerCase() === 'error';
        var estadoColor = fallo ? 'var(--err)' : 'var(--ok)';
        var asuntoMensaje = r.asunto ? escapar(r.asunto) : escapar(String(r.cuerpo || '').slice(0, 80));
        var acciones = fallo && puedeEditar()
          ? '<button class="btn-mini" onclick="reenviarComunicacionUI(\'' + escaparAttr(r.id) + '\', this)" title="' + escaparAttr(r.detalle || '') + '">🔁 Reenviar</button>'
          : '';
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td style="font-size:var(--fs-xs);white-space:nowrap">' + escapar(r.fecha) + '</td>' +
          '<td style="font-size:var(--fs-xs)">' + icono + ' ' + escapar(r.tipo) + '</td>' +
          '<td style="font-size:var(--fs-xs)">' + escapar(r.empleado_nombre || '—') + '</td>' +
          '<td style="font-size:var(--fs-xs)">' + escapar(r.destinatario || '—') + '</td>' +
          '<td style="font-size:var(--fs-xs);max-width:320px;overflow-wrap:anywhere">' + asuntoMensaje + '</td>' +
          '<td style="font-size:var(--fs-xs);color:' + estadoColor + ';font-weight:600;text-transform:capitalize" title="' + escaparAttr(r.detalle || '') + '">' + escapar(r.estado) + '</td>' +
          '<td class="no-print" style="font-size:var(--fs-xs)">' + acciones + '</td>';
        cuerpo.appendChild(tr);
      });
    });
  }

  function reenviarComunicacionUI(id, btnEl) {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Reenviando...'; }
    llamarBackend('reenviarComunicacion', [id], function (res) {
      mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
      _cargarHistorialComunicaciones();
    });
  }

  // ── Enviar mensaje ──────────────────────────────────────────

  function cambiarCanalesComunicacion() {
    var email = document.getElementById('comCanalEmail').checked;
    var whatsapp = document.getElementById('comCanalWhatsapp').checked;
    document.getElementById('comBloqueEmail').classList.toggle('oculto', !email);
    document.getElementById('comBloqueWhatsapp').classList.toggle('oculto', !whatsapp);
  }

  function _llenarSelectPlantillasEmail() {
    var sel = document.getElementById('comPlantillaEmail');
    var valorActual = sel.value;
    sel.innerHTML = '<option value="">— Sin plantilla (mensaje libre) —</option>';
    PLANTILLAS_CACHE.filter(function (p) { return p.tipo === 'email'; }).forEach(function (p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.nombre;
      sel.appendChild(opt);
    });
    sel.value = valorActual;
  }

  function _llenarSelectPlantillasWhatsapp() {
    var sel = document.getElementById('comPlantillaWhatsapp');
    var valorActual = sel.value;
    sel.innerHTML = '<option value="">— Sin plantilla (mensaje libre) —</option>';
    PLANTILLAS_CACHE.filter(function (p) { return p.tipo === 'whatsapp'; }).forEach(function (p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.nombre;
      sel.appendChild(opt);
    });
    sel.value = valorActual;
  }

  function aplicarPlantillaEmail() {
    var id = document.getElementById('comPlantillaEmail').value;
    if (!id) return;
    var plantilla = PLANTILLAS_CACHE.filter(function (p) { return String(p.id) === String(id); })[0];
    if (!plantilla) return;
    document.getElementById('comAsunto').value = plantilla.asunto || '';
    document.getElementById('comCuerpoEmail').value = plantilla.cuerpo || '';
  }

  function aplicarPlantillaWhatsapp() {
    var id = document.getElementById('comPlantillaWhatsapp').value;
    if (!id) return;
    var plantilla = PLANTILLAS_CACHE.filter(function (p) { return String(p.id) === String(id); })[0];
    if (!plantilla) return;
    document.getElementById('comCuerpoWhatsapp').value = plantilla.cuerpo || '';
  }

  function enviarComunicacion() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    var empleadoId = document.getElementById('comEmpleado').value;
    var porEmail = document.getElementById('comCanalEmail').checked;
    var porWhatsapp = document.getElementById('comCanalWhatsapp').checked;

    if (!empleadoId) { mostrarMensaje('Selecciona un empleado.', 'error'); return; }
    if (!porEmail && !porWhatsapp) { mostrarMensaje('Marca al menos un medio (Correo o WhatsApp).', 'error'); return; }

    var plantillaIdEmail = document.getElementById('comPlantillaEmail').value;
    var asunto = document.getElementById('comAsunto').value.trim();
    var cuerpoEmail = document.getElementById('comCuerpoEmail').value.trim();
    var plantillaIdWhatsapp = document.getElementById('comPlantillaWhatsapp').value;
    var cuerpoWhatsapp = document.getElementById('comCuerpoWhatsapp').value.trim();

    if (porEmail && !plantillaIdEmail && !cuerpoEmail) {
      mostrarMensaje('Escribe un mensaje de correo o elige una plantilla.', 'error'); return;
    }
    if (porWhatsapp && !plantillaIdWhatsapp && !cuerpoWhatsapp) {
      mostrarMensaje('Escribe un mensaje de WhatsApp o elige una plantilla.', 'error'); return;
    }

    var btn = document.getElementById('btnEnviarComunicacion');
    var resultado = document.getElementById('comResultado');
    resultado.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    function terminar(res) {
      btn.disabled = false;
      btn.textContent = '🚀 Enviar';
      resultado.innerHTML = res.ok
        ? '<span style="color:var(--ok)">✅ ' + escapar(res.mensaje) + '</span>'
        : '<span style="color:var(--err)">❌ ' + escapar(res.mensaje) + '</span>';
      if (res.ok) _cargarHistorialComunicaciones();
    }

    // Un solo medio: usar las funciones simples de siempre.
    if (porEmail && !porWhatsapp) {
      llamarBackend('enviarCorreoPlantilla', [{
        empleado_id: empleadoId, plantilla_id: plantillaIdEmail || null, asunto: asunto, cuerpo: cuerpoEmail
      }], terminar);
      return;
    }
    if (porWhatsapp && !porEmail) {
      llamarBackend('enviarWhatsappPlantilla', [{
        empleado_id: empleadoId, plantilla_id: plantillaIdWhatsapp || null, cuerpo: cuerpoWhatsapp
      }], terminar);
      return;
    }

    // Ambos medios a la vez.
    llamarBackend('enviarComunicacionAmbos', [{
      empleado_id: empleadoId,
      email: true, whatsapp: true,
      plantilla_id_email: plantillaIdEmail || null, asunto: asunto, cuerpo_email: cuerpoEmail,
      plantilla_id_whatsapp: plantillaIdWhatsapp || null, cuerpo_whatsapp: cuerpoWhatsapp
    }], terminar);
  }

  // ── Plantillas: listar / crear / editar / eliminar ──────────

  function _pintarPlantillas() {
    var cuerpo = document.getElementById('cuerpoPlantillas');
    cuerpo.innerHTML = '';
    document.getElementById('sinPlantillas').classList.toggle('oculto', PLANTILLAS_CACHE.length > 0);
    PLANTILLAS_CACHE.forEach(function (p) {
      var icono = p.tipo === 'whatsapp' ? '💬 WhatsApp' : '📧 Correo';
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + escapar(p.nombre) + '</td>' +
        '<td>' + icono + '</td>' +
        '<td style="font-size:var(--fs-xs);color:var(--txt-2)">' + escapar(p.asunto || '—') + '</td>' +
        '<td class="no-print"></td>';
      var tdAcciones = tr.querySelector('td.no-print');
      if (puedeEditar()) {
        var btnEditar = document.createElement('button');
        btnEditar.className = 'btn-mini';
        btnEditar.textContent = 'Editar';
        btnEditar.onclick = function () { editarPlantilla(p.id); };
        var btnEliminar = document.createElement('button');
        btnEliminar.className = 'btn-mini peligro';
        btnEliminar.textContent = 'Eliminar';
        btnEliminar.onclick = function () { eliminarPlantillaUI(p.id); };
        tdAcciones.appendChild(btnEditar);
        tdAcciones.appendChild(btnEliminar);
      }
      cuerpo.appendChild(tr);
    });
  }

  function toggleAsuntoPlantilla() {
    var tipo = document.getElementById('pltTipo').value;
    document.getElementById('pltAsuntoWrap').style.display = (tipo === 'email') ? '' : 'none';
  }

  function abrirFormPlantilla() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    document.getElementById('formPlantilla').reset();
    document.getElementById('pltId').value = '';
    document.getElementById('modalPlantillaTitulo').textContent = 'Nueva plantilla';
    toggleAsuntoPlantilla();
    _actualizarVistaPreviaPlantilla();
    document.getElementById('modalPlantilla').classList.remove('oculto');
  }

  function editarPlantilla(id) {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    var p = PLANTILLAS_CACHE.filter(function (x) { return String(x.id) === String(id); })[0];
    if (!p) return;
    document.getElementById('pltId').value = p.id;
    document.getElementById('pltNombre').value = p.nombre;
    document.getElementById('pltTipo').value = p.tipo;
    document.getElementById('pltAsunto').value = p.asunto || '';
    document.getElementById('pltCuerpo').value = p.cuerpo || '';
    document.getElementById('modalPlantillaTitulo').textContent = 'Editar plantilla';
    toggleAsuntoPlantilla();
    _actualizarVistaPreviaPlantilla();
    document.getElementById('modalPlantilla').classList.remove('oculto');
  }

  function cerrarModalPlantilla() {
    document.getElementById('modalPlantilla').classList.add('oculto');
  }

  // ── Vista previa en vivo (con datos de ejemplo, no llama al backend) ──

  var PLANTILLA_DATOS_EJEMPLO = {
    nombre: 'Juan Pérez Rodríguez',
    cedula: '1-2345-6789',
    puesto: 'Analista de Recursos Humanos',
    departamento: 'Recursos Humanos',
    correo: 'juan.perez@empresa.com',
    telefono: '8888-8888',
    salario: 650000,
    fecha_ingreso: '2023-03-15'
  };

  // Réplica en el cliente de _reemplazarVariablesPlantilla (Code.gs) — solo
  // para la vista previa instantánea del editor. El envío real siempre pasa
  // por la función del backend con los datos verdaderos del empleado.
  function _reemplazarVariablesPlantillaCliente(texto) {
    if (!texto) return '';
    var e = PLANTILLA_DATOS_EJEMPLO;
    var mapa = {
      nombre: e.nombre,
      cedula: e.cedula,
      puesto: e.puesto,
      departamento: e.departamento,
      correo: e.correo,
      telefono: e.telefono,
      salario: '₡' + Number(e.salario).toLocaleString('es-CR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }),
      fecha_ingreso: e.fecha_ingreso,
      fecha: new Date().toISOString().slice(0, 10)
    };
    return String(texto).replace(/\{\{\s*(\w+)\s*\}\}/g, function (m, campo) {
      return (mapa[campo] !== undefined) ? mapa[campo] : m;
    });
  }

  function _actualizarVistaPreviaPlantilla() {
    var tipo = document.getElementById('pltTipo').value;
    var asunto = document.getElementById('pltAsunto').value;
    var cuerpo = document.getElementById('pltCuerpo').value;
    document.getElementById('pltVistaPreviaAsuntoWrap').classList.toggle('oculto', tipo !== 'email');
    document.getElementById('pltVistaPreviaAsunto').textContent = _reemplazarVariablesPlantillaCliente(asunto) || '(sin asunto)';
    document.getElementById('pltVistaPreviaCuerpo').textContent = _reemplazarVariablesPlantillaCliente(cuerpo) || '(el mensaje aparecerá aquí)';
  }

  function _recargarPlantillas() {
    llamarBackend('listarPlantillas', [null], function (lista) {
      if (lista && lista.ok === false) { mostrarMensaje(lista.mensaje, 'error'); lista = []; }
      PLANTILLAS_CACHE = lista || [];
      _pintarPlantillas();
      _llenarSelectPlantillasEmail();
      _llenarSelectPlantillasWhatsapp();
    });
  }

  function guardarPlantillaUI(event) {
    event.preventDefault();
    var datos = {
      id: document.getElementById('pltId').value,
      nombre: document.getElementById('pltNombre').value.trim(),
      tipo: document.getElementById('pltTipo').value,
      asunto: document.getElementById('pltAsunto').value.trim(),
      cuerpo: document.getElementById('pltCuerpo').value.trim()
    };
    if (!datos.nombre || !datos.cuerpo) { mostrarMensaje('Nombre y cuerpo son obligatorios.', 'error'); return; }
    llamarBackend('guardarPlantilla', [datos], function (res) {
      mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
      if (res.ok) {
        cerrarModalPlantilla();
        _recargarPlantillas();
      }
    });
  }

  function eliminarPlantillaUI(id) {
    confirmarAccion('¿Eliminar esta plantilla? Esta acción no se puede deshacer.', function () {
      llamarBackend('eliminarPlantilla', [id], function (res) {
        mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
        if (res.ok) {
          PLANTILLAS_CACHE = PLANTILLAS_CACHE.filter(function (p) { return String(p.id) !== String(id); });
          _pintarPlantillas();
          _llenarSelectPlantillasEmail();
          _llenarSelectPlantillasWhatsapp();
        }
      });
    }, 'Eliminar');
  }

  function cargarPlantillasProfesionalesUI() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    confirmarAccion(
      'Esto agrega un paquete de plantillas profesionales (bienvenida, vacaciones, cumpleaños, planilla, etc.) en correo y WhatsApp. Si ya existen no se duplican. ¿Continuar?',
      function () {
        llamarBackend('crearPlantillasProfesionales', [], function (res) {
          mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
          if (res.ok) _recargarPlantillas();
        });
      },
      'Cargar plantillas'
    );
  }

  function cargarPlantillasMinimalistasUI() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    confirmarAccion(
      'Esto agrega un paquete de plantillas minimalistas (sin emojis, tono formal) en correo y WhatsApp, para los mismos escenarios que el paquete profesional. Si ya existen no se duplican. ¿Continuar?',
      function () {
        llamarBackend('crearPlantillasMinimalistas', [], function (res) {
          mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
          if (res.ok) _recargarPlantillas();
        });
      },
      'Cargar plantillas'
    );
  }

  // Nota: la API Key de CallMeBot se configura en Alertas → Notificaciones
  // por WhatsApp (módulo compartido, ver Js_Alertas.html). No se duplica aquí.
</script>
