<style>
/* ============================================================
   SISTEMA RRHH — Design System v2
   Sidebar layout · Indigo primary · Card-based · Responsive
   ============================================================ */

/* ── Variables ─────────────────────────────────────────────── */
:root {
  /* Marca */
  --p:       #4f46e5;   /* indigo-600 */
  --p-dark:  #4338ca;
  --p-light: #eef2ff;
  --p-ring:  rgba(79,70,229,.18);

  /* Sidebar */
  --sb-bg:      #0f172a;
  --sb-text:    #94a3b8;
  --sb-active:  #4f46e5;
  --sb-hover:   #1e293b;
  --sb-border:  rgba(255,255,255,.06);
  --sb-w:       240px;

  /* Superficie */
  --bg:       #f1f5f9;
  --surface:  #ffffff;
  --border:   #e2e8f0;
  --border-s: #cbd5e1;

  /* Texto */
  --txt:      #0f172a;
  --txt-2:    #475569;
  --txt-3:    #94a3b8;

  /* Semántico */
  --ok:       #10b981;   --ok-bg:   #d1fae5;  --ok-txt:  #065f46;
  --warn:     #f59e0b;   --warn-bg: #fef3c7;  --warn-txt:#92400e;
  --err:      #ef4444;   --err-bg:  #fee2e2;  --err-txt: #991b1b;
  --info:     #3b82f6;   --info-bg: #dbeafe;

  /* Sombras */
  --sh-xs: 0 1px 2px rgba(0,0,0,.05);
  --sh-s:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh-m:  0 4px 8px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
  --sh-l:  0 12px 24px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.05);

  /* Radios */
  --r:    8px;
  --r-lg: 12px;
  --r-xl: 16px;

  /* Layout */
  --topbar-h: 58px;
}

/* ── Reset base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

html, body {
  width: 100%;
  min-height: 100%;
  height: auto;
  overflow-x: hidden;
  overflow-y: auto;
}

body {
  font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--txt);
  background: var(--bg);
}

/* ── App layout (sidebar + main) ─────────────────────────── */
.app-layout {
  display: flex;
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  height: auto;
  overflow: visible;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sb-w);
  min-width: var(--sb-w);
  background: var(--sb-bg);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 100;
  transition: transform .22s cubic-bezier(.4,0,.2,1);
}

/* Brand / logo */
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 18px 16px 16px;
  border-bottom: 1px solid var(--sb-border);
  flex-shrink: 0;
}

.sb-icon {
  width: 36px; height: 36px;
  background: var(--p);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(79,70,229,.35);
}

.sb-brand-name  { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: -.2px; line-height: 1.2; }
.sb-brand-sub   { font-size: 11px; color: var(--sb-text); display: block; margin-top: 1px; }

/* Nav */
.sidebar-nav {
  flex: 1;
  padding: 10px 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow-y: auto;
}

.nav-sep {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--sb-text);
  padding: 14px 12px 5px;
  opacity: .6;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border: none;
  background: transparent;
  color: var(--sb-text);
  border-radius: var(--r);
  cursor: pointer;
  font-size: 13.5px;
  font-family: inherit;
  text-align: left;
  transition: background .14s, color .14s;
  width: 100%;
}
.nav-item:hover       { background: var(--sb-hover); color: #e2e8f0; }
.nav-item.activo      { background: var(--sb-active); color: #fff; font-weight: 600; }
.nav-icon             { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; line-height: 1; }
.nav-label            { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Footer */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--sb-border);
  font-size: 11px;
  color: var(--sb-text);
  flex-shrink: 0;
}

/* Mobile overlay */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 90;
  cursor: pointer;
}

/* ── Main area ───────────────────────────────────────────── */
.main-area {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  height: auto;
  overflow: visible;
}

/* ── Topbar ──────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  flex-shrink: 0;
  box-shadow: var(--sh-xs);
  flex-wrap: wrap;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
  flex-shrink: 0;
}

.topbar-toggle {
  display: none;
  align-items: center; justify-content: center;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 8px;
  cursor: pointer;
  color: var(--txt-2);
  font-size: 17px;
  line-height: 1;
}

.topbar-titulo {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--txt);
}

/* ── Content scroll area ─────────────────────────────────── */
.contenido {
  flex: 1 1 auto;
  overflow-x: auto;
  overflow-y: visible;
  padding: 22px 24px 64px;
}

/* Global notifications */
.msg-wrapper { padding: 0 24px; flex-shrink: 0; }

/* ── Contenedor (legacy/compat) ──────────────────────────── */
.contenedor { width: 100%; }

/* ── Vistas ──────────────────────────────────────────────── */
.vista { animation: fadeUp .2s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.titulo-vista { display: none; } /* topbar maneja el título */

/* ── Tarjetas KPI (Dashboard) ────────────────────────────── */
.tarjetas {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  margin-bottom: 24px;
}

.tarjeta {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--sh-s);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.tarjeta::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--p);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
}

.tarjeta .num {
  font-size: 32px;
  font-weight: 700;
  color: var(--txt);
  line-height: 1.1;
  letter-spacing: -1px;
}

.tarjeta .lbl {
  font-size: 12px;
  color: var(--txt-3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-top: 6px;
}

/* ── Guía de uso (Dashboard) ─────────────────────────────── */
.guia {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 22px 24px;
  box-shadow: var(--sh-s);
}

.guia-titulo   { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.guia-intro    { color: var(--txt-2); font-size: 13.5px; margin-bottom: 16px; }
.guia-pasos    { padding-left: 20px; display: flex; flex-direction: column; gap: 8px; }
.guia-pasos li { font-size: 13.5px; line-height: 1.5; }
.guia-nota {
  margin-top: 16px;
  background: var(--info-bg);
  border-radius: var(--r);
  padding: 12px 15px;
  font-size: 13px;
  color: #1e40af;
}
.chip {
  display: inline-block;
  background: var(--p-light);
  color: var(--p);
  border-radius: 5px;
  padding: 0 6px;
  font-weight: 700;
  font-size: 12px;
}

/* ── Barra de acciones ────────────────────────────────────── */
.barra-acciones {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.barra-acciones > * { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.filtros { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

#buscador {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 13.5px;
  min-width: 220px;
  background: var(--surface);
  color: var(--txt);
  transition: border-color .15s, box-shadow .15s;
}
#buscador:focus {
  outline: none;
  border-color: var(--p);
  box-shadow: 0 0 0 3px var(--p-ring);
}

.check-activos { font-size: 13px; color: var(--txt-2); cursor: pointer; user-select: none; }

/* ── Botones ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: none;
  border-radius: var(--r);
  padding: 9px 16px;
  font-size: 13.5px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  line-height: 1;
  transition: background .14s, box-shadow .14s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.98); }

.btn-primario {
  background: var(--p);
  color: #fff;
  box-shadow: 0 1px 2px rgba(79,70,229,.2);
}
.btn-primario:hover {
  background: var(--p-dark);
  box-shadow: 0 3px 8px rgba(79,70,229,.3);
}

.btn-secundario {
  background: var(--surface);
  color: var(--txt);
  border: 1px solid var(--border-s);
  box-shadow: var(--sh-xs);
}
.btn-secundario:hover { background: var(--bg); border-color: var(--p); color: var(--p); }

.btn-peligro {
  background: var(--err);
  color: #fff;
}
.btn-peligro:hover { opacity: .88; }

.btn-mini {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  font-size: 12.5px;
  font-family: inherit;
  font-weight: 500;
  background: var(--p-light);
  color: var(--p);
  border-radius: 6px;
  border: none;
  cursor: pointer;
  transition: background .14s;
}
.btn-mini:hover { background: #e0e7ff; }
.btn-mini.peligro { background: var(--err-bg); color: var(--err); }
.btn-mini.peligro:hover { background: #fecaca; }

/* ── Tabla ───────────────────────────────────────────────── */
.tabla-envoltorio {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--sh-s);
}

.tabla {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

.tabla thead th {
  padding: 10px 14px;
  text-align: left;
  background: var(--bg);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--txt-2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.tabla tbody td {
  padding: 12px 14px;
  font-size: 13.5px;
  border-bottom: 1px solid var(--border);
  color: var(--txt);
  vertical-align: middle;
}

.tabla tbody tr:last-child td { border-bottom: none; }
.tabla tbody tr:hover td      { background: #fafbff; }

.fila-total td { font-weight: 700; background: var(--p-light) !important; color: var(--p); }

.sin-datos {
  text-align: center;
  color: var(--txt-3);
  padding: 40px 24px;
  font-size: 14px;
}

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 600;
  white-space: nowrap;
}
.badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.badge.activo    { background: var(--ok-bg);   color: var(--ok-txt);   }
.badge.activo::before    { background: var(--ok);   }
.badge.inactivo  { background: #f1f5f9;         color: var(--txt-2);    }
.badge.inactivo::before  { background: var(--txt-3); }
.badge.pendiente { background: var(--warn-bg);  color: var(--warn-txt); }
.badge.pendiente::before { background: var(--warn);  }
.badge.aprobada  { background: var(--ok-bg);    color: var(--ok-txt);   }
.badge.aprobada::before  { background: var(--ok);   }
.badge.rechazada { background: var(--err-bg);   color: var(--err-txt);  }
.badge.rechazada::before { background: var(--err);  }

/* ── Mensajes ────────────────────────────────────────────── */
.mensaje {
  padding: 13px 16px;
  border-radius: var(--r);
  margin: 10px 0;
  font-size: 13.5px;
  font-weight: 500;
  border-left: 3px solid transparent;
}
.mensaje.exito {
  background: var(--ok-bg);
  color: var(--ok-txt);
  border-color: var(--ok);
}
.mensaje.error {
  background: var(--err-bg);
  color: var(--err-txt);
  border-color: var(--err);
}

.cargando {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--txt-3);
  font-size: 13.5px;
  padding: 6px 0;
}

.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--p);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Sección / bloque de contenido ──────────────────────── */
.seccion {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-s);
  overflow: hidden;
  margin-bottom: 20px;
}

.seccion-cab {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Modal ───────────────────────────────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.5);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px;
  overflow-y: auto;
  z-index: 200;
  backdrop-filter: blur(2px);
  animation: fadeModal .15s ease;
}
@keyframes fadeModal { from { opacity: 0; } }

.modal-contenido {
  background: var(--surface);
  border-radius: var(--r-xl);
  width: 100%;
  max-width: 480px;
  box-shadow: var(--sh-l);
  animation: slideModal .18s ease;
  border-top: 3px solid var(--p);
}
@keyframes slideModal {
  from { opacity: 0; transform: translateY(-10px); }
}

.modal-grande { max-width: 680px; }

.modal-cabecera {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.modal-cabecera h2 { margin: 0; font-size: 16px; font-weight: 700; }

.cerrar {
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  color: var(--txt-2);
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  transition: background .14s;
}
.cerrar:hover { background: var(--err-bg); color: var(--err); border-color: var(--err); }

/* ── Formularios ─────────────────────────────────────────── */
form { padding: 16px 20px; }

.campo { margin-bottom: 14px; }

.campo label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--txt-2);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .03em;
}

.campo input,
.campo select {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-size: 13.5px;
  font-family: inherit;
  color: var(--txt);
  background: var(--surface);
  transition: border-color .14s, box-shadow .14s;
}
.campo input:focus,
.campo select:focus {
  outline: none;
  border-color: var(--p);
  box-shadow: 0 0 0 3px var(--p-ring);
}
.campo input:disabled { background: var(--bg); color: var(--txt-3); cursor: not-allowed; }

.error { color: var(--err); font-size: 11.5px; display: block; margin-top: 4px; }

.modal-pie {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* ── Configuración ───────────────────────────────────────── */
.config-bloque {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--sh-s);
}
.config-bloque h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--txt);
  display: flex;
  align-items: center;
  gap: 6px;
}
.config-ayuda {
  color: var(--txt-2);
  font-size: 13px;
  margin-bottom: 14px;
  line-height: 1.55;
}
.config-ayuda code {
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 12px;
  border: 1px solid var(--border);
}
.config-fila { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.config-fila input {
  flex: 1; min-width: 220px;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-size: 13.5px;
  font-family: inherit;
  transition: border-color .14s, box-shadow .14s;
}
.config-fila input:focus {
  outline: none; border-color: var(--p);
  box-shadow: 0 0 0 3px var(--p-ring);
}
.config-estado {
  font-size: 13.5px;
  line-height: 1.6;
  padding: 13px 15px;
  border-radius: var(--r);
  margin-bottom: 10px;
}
.ok-conexion    { background: var(--ok-bg);   border: 1px solid #a7f3d0; color: var(--ok-txt); }
.error-conexion { background: var(--err-bg);  border: 1px solid #fca5a5; color: var(--err-txt); }
.config-dato    { color: var(--txt-3); font-size: 12px; }

/* ── Configuración de correo (SMTP) ─────────────────────── */
.smtp-fila  { display: flex; gap: 12px; flex-wrap: wrap; }
.smtp-campo { flex: 1; min-width: 200px; }
.smtp-ayuda-texto {
  font-size: 13px; color: var(--txt-2); line-height: 1.5;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px; margin-top: 10px;
}
.smtp-ayuda-texto strong { color: var(--txt); }

/* ── Reportes / Charts ───────────────────────────────────── */
.reportes-grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
}
.reporte-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  box-shadow: var(--sh-s);
}
.reporte-card h3   { font-size: 13.5px; font-weight: 600; margin-bottom: 12px; color: var(--txt-2); }
.reporte-ancho     { grid-column: 1 / -1; }
.grafico           { width: 100%; min-height: 280px; }
.grafico-vacio     { text-align: center; color: var(--txt-3); padding: 40px 0; font-size: 13px; }

/* ── Alertas ─────────────────────────────────────────────── */
.alerta-fila {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.alerta-fila:last-child { border-bottom: none; }
.alerta-info            { flex: 1; min-width: 180px; }
.alerta-info strong     { display: block; font-size: 13.5px; font-weight: 600; margin-bottom: 2px; }
.alerta-info span       { font-size: 12.5px; color: var(--txt-2); line-height: 1.4; }
.alerta-extra           { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--txt-2); }
.alerta-extra input     { width: 64px; padding: 5px 8px; border: 1.5px solid var(--border); border-radius: var(--r); font-size: 13px; }

/* Toggle switch */
.toggle          { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
.toggle input    { opacity: 0; width: 0; height: 0; }
