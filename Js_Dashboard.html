<script>
  /* ============================================================
     MÓDULO DASHBOARD — v12 (Chart.js local vía Lib_Chart)
     ============================================================ */
  var ULTIMO_DASHBOARD = null;

  window.addEventListener('resize', function () {
    if (ULTIMO_DASHBOARD &&
        !document.getElementById('vista-dashboard').classList.contains('oculto')) {
      _dibujarGraficasDashboard(ULTIMO_DASHBOARD);
    }
  });

  function cargarDashboard() {
    cargarLibreriaLocal('chart', function () {
      if (typeof Chart === 'undefined') {
        setTimeout(cargarDashboard, 200);
        return;
      }
      llamarBackend('obtenerDashboard', [], function (d) {
      ULTIMO_DASHBOARD = d;

      // Mostrar alertas si hay
      if (d.alertas && d.alertas.length > 0) {
        _mostrarAlertas(d.alertas);
      }

      var tarjetas = [
        { num: d.empleadosActivos,            lbl: 'Empleados activos',      icono: '👤' },
        { num: d.totalDepartamentos,          lbl: 'Departamentos',           icono: '🏢' },
        { num: d.vacacionesPendientes,        lbl: 'Vacaciones pendientes',   icono: '🌴' },
        { num: formatoDinero(d.masaSalarial), lbl: 'Masa salarial',           icono: '💰' },
        { num: d.nominasMesActual,            lbl: 'Nóminas ' + d.mesActual,  icono: '📋' },
        { num: formatoDinero(d.totalNetoMes), lbl: 'Neto pagado este mes',    icono: '💳' }
      ];
      var cont = document.getElementById('tarjetasDashboard');
      cont.innerHTML = '';
      tarjetas.forEach(function (t) {
        var div = document.createElement('div');
        div.className = 'tarjeta';
        div.innerHTML =
          '<div style="font-size:var(--fs-xl);margin-bottom:4px">' + t.icono + '</div>' +
          '<div class="num">' + escapar(t.num) + '</div>' +
          '<div class="lbl">' + escapar(t.lbl) + '</div>';
        cont.appendChild(div);
      });
      _dibujarGraficasDashboard(d);
    });
    });
  }

  function _mostrarAlertas(alertas) {
    var cont = document.getElementById('tarjetasDashboard');
    if (!cont) return;

    var divAlertas = document.getElementById('dashAlertas');
    if (!divAlertas) {
      divAlertas = document.createElement('div');
      divAlertas.id = 'dashAlertas';
      cont.parentNode.insertBefore(divAlertas, cont);
    }

    divAlertas.innerHTML = '<h3 style="margin-top:0;color:var(--txt-1)">⚠️ Alertas automáticas</h3>';

    var iconos = {
      cedula_vencida: '🆔',
      cedula_proxima: '⏰',
      licencia_vencida: '🚗',
      licencia_proxima: '⏰',
      evaluacion_proxima: '📊',
      prueba_proxima: '🆕'
    };

    alertas.forEach(function(a) {
      var div = document.createElement('div');
      var colorUrgencia = { crítica: '#dc2626', alta: '#f97316', media: '#d97706', baja: '#4f46e5' };
      div.style.cssText = 'padding:10px;margin-bottom:8px;background:'+colorUrgencia[a.urgencia]+'20;' +
        'border-left:3px solid '+colorUrgencia[a.urgencia]+';border-radius:var(--r);font-size:var(--fs-sm)';
      div.innerHTML = (iconos[a.tipo] || '⚠️') + ' <strong>' + escapar(a.empleado) + ':</strong> ' +
        escapar(a.mensaje) + ' <span style="color:var(--txt-3)">('+escapar(a.fecha)+')</span>';
      divAlertas.appendChild(div);
    });
  }

  function _dibujarGraficasDashboard(d) {
    var cont = document.getElementById('tarjetasDashboard');
    var wrapper = document.getElementById('dashGraficas');
    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.id = 'dashGraficas';
      wrapper.className = 'dash-graficas-grid';
      cont.parentNode.insertBefore(wrapper, cont.nextSibling);
    }
    wrapper.innerHTML =
      '<div class="dash-chart-card">' +
        '<h3 class="dash-chart-titulo">Empleados por departamento</h3>' +
        '<div id="dashChartDeptos" class="dash-chart-canvas"></div>' +
        '<p class="sin-datos oculto" id="dashChartDeptosVacio">Sin datos de departamentos.</p>' +
      '</div>' +
      '<div class="dash-chart-card">' +
        '<h3 class="dash-chart-titulo">Nómina neta últimos meses</h3>' +
        '<div id="dashChartNomina" class="dash-chart-canvas"></div>' +
        '<p class="sin-datos oculto" id="dashChartNominaVacio">Sin registros de nómina.</p>' +
      '</div>';

    var deptos = d.empleadosPorDepto || [];
    var elDep = document.getElementById('dashChartDeptos');
    var elDepVacio = document.getElementById('dashChartDeptosVacio');
    if (deptos.length) {
      elDep.style.display = '';
      elDepVacio.classList.add('oculto');
      var canvasDep = prepararCanvasGrafico('dashChartDeptos');
      _chartInst.dashChartDeptos = new Chart(canvasDep, {
        type: 'bar',
        data: {
          labels: deptos.map(function (x) { return x.nombre; }),
          datasets: [{
            label: 'Empleados',
            data: deptos.map(function (x) { return Number(x.total) || 0; }),
            backgroundColor: '#4f46e5',
            borderRadius: 6
          }]
        },
        options: Object.assign({}, CHART_OPTS_BASE, {
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0 } }
          }
        })
      });
    } else {
      elDep.style.display = 'none';
      elDepVacio.classList.remove('oculto');
    }

    var nomHist = d.nominaHistorica || [];
    var elNom = document.getElementById('dashChartNomina');
    var elNomVacio = document.getElementById('dashChartNominaVacio');
    if (nomHist.length) {
      elNom.style.display = '';
      elNomVacio.classList.add('oculto');
      var canvasNom = prepararCanvasGrafico('dashChartNomina');
      _chartInst.dashChartNomina = new Chart(canvasNom, {
        type: 'line',
        data: {
          labels: nomHist.map(function (x) { return x.mes; }),
          datasets: [{
            label: 'Neto',
            data: nomHist.map(function (x) { return Number(x.neto) || 0; }),
            borderColor: '#4f46e5',
            backgroundColor: 'rgba(79, 70, 229, 0.12)',
            fill: true,
            tension: 0.35,
            pointRadius: 4
          }]
        },
        options: Object.assign({}, CHART_OPTS_BASE, {
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function (ctx) { return formatoDinero(ctx.parsed.y); }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: function (v) { return formatoDinero(v); } }
            }
          }
        })
      });
    } else {
      elNom.style.display = 'none';
      elNomVacio.classList.remove('oculto');
    }
  }
</script>
