<script>
  /* ============================================================
     MÓDULO DEPARTAMENTOS (frontend)
     ============================================================ */

  var DEPARTAMENTOS = [];

  function cargarDepartamentos() {
    llamarBackend('listarDepartamentos', [], function (lista) {
      DEPARTAMENTOS = lista || [];
      var cuerpo = document.getElementById('cuerpoDeptos');
      cuerpo.innerHTML = '';
      document.getElementById('sinDeptos').classList.toggle('oculto', DEPARTAMENTOS.length > 0);
      DEPARTAMENTOS.forEach(function (d) {
        var tr = document.createElement('tr');
        var acciones = puedeEditar()
          ? '<button class="btn-mini" onclick="editarDepto(\'' + escaparAttr(d.id) + '\')">Editar</button>' +
            '<button class="btn-mini peligro" onclick="eliminarDepto(\'' + escaparAttr(d.id) + '\')">Eliminar</button>'
          : '—';
        tr.innerHTML =
          '<td>' + escapar(d.nombre) + '</td>' +
          '<td>' + escapar(d.responsable || '—') + '</td>' +
          '<td class="no-print">' + acciones + '</td>';
        cuerpo.appendChild(tr);
      });
    });
  }

  function abrirFormDepto() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos para editar departamentos.', 'error'); return; }
    document.getElementById('formDepto').reset();
    document.getElementById('depId').value = '';
    document.getElementById('errDepNombre').textContent = '';
    document.getElementById('modalDeptoTitulo').textContent = 'Nuevo departamento';
    document.getElementById('modalDepto').classList.remove('oculto');
  }

  function editarDepto(id) {
    var d = DEPARTAMENTOS.filter(function (x) { return String(x.id) === String(id); })[0];
    if (!d) return;
    document.getElementById('depId').value = d.id;
    document.getElementById('depNombre').value = d.nombre || '';
    document.getElementById('depResponsable').value = d.responsable || '';
    document.getElementById('errDepNombre').textContent = '';
    document.getElementById('modalDeptoTitulo').textContent = 'Editar departamento';
    document.getElementById('modalDepto').classList.remove('oculto');
  }

  function cerrarModalDepto() { document.getElementById('modalDepto').classList.add('oculto'); }

  function guardarDepto(evento) {
    evento.preventDefault();
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    var datos = {
      id: document.getElementById('depId').value,
      nombre: document.getElementById('depNombre').value,
      responsable: document.getElementById('depResponsable').value
    };
    if (!datos.nombre.trim()) {
      document.getElementById('errDepNombre').textContent = 'El nombre es obligatorio.';
      return;
    }
    var btn = document.getElementById('btnGuardarDepto');
    btn.disabled = true; btn.textContent = 'Guardando...';
    var fn = datos.id ? 'actualizarDepartamento' : 'crearDepartamento';
    llamarBackend(fn, [datos], function (res) {
      btn.disabled = false; btn.textContent = 'Guardar';
      if (res.ok) {
        cerrarModalDepto();
        mostrarMensaje(res.mensaje, 'exito');
        cargarDepartamentos();
      } else {
        mostrarMensaje(res.mensaje, 'error');
      }
    });
  }

  function eliminarDepto(id) {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    if (!confirm('¿Eliminar este departamento?')) return;
    llamarBackend('eliminarDepartamento', [id], function (res) {
      mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
      if (res.ok) cargarDepartamentos();
    });
  }
</script>
