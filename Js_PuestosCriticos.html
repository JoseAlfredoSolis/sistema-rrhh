<script>
  /* ============================================================
     MÓDULO PUESTOS CRÍTICOS
     ============================================================ */
  function cargarPuestosCriticos() {
    llamarBackend('obtenerPuestosCriticos', [], function (r) {
      if (!r || !r.ok) { mostrarMensaje((r && r.mensaje) || 'No se pudo cargar.', 'error'); return; }
      _pintarKpisPuestosCriticos(r);
      _pintarAlertasPuestosCriticos(r.alertas);
      _pintarTablaPuestosCriticos(r.empleados);
      cargarLibreriaLocal('chart', function () {
        if (typeof Chart === 'undefined') return;
        graficoPastel('grafPuestosCriticos', r.porDepartamento);
      });
    });
  }

  var _ICONOS_ALERTA_PC = {
    cedula_vencida: '🆔', cedula_proxima: '⏰', licencia_vencida: '🚗',
    licencia_proxima: '⏰', evaluacion_proxima: '📊', prueba_proxima: '🆕'
  };
  var _COLOR_URGENCIA_PC = { 'crítica': '#dc2626', alta: '#f97316', media: '#d97706', baja: '#4f46e5' };

  function _pintarAlertasPuestosCriticos(alertas) {
    alertas = alertas || [];
    var cont = document.getElementById('alertasPuestosCriticos');
    if (!alertas.length) {
      cont.innerHTML = '<p class="sin-datos" style="margin:0 0 16px">Sin alertas pendientes para los puestos críticos. ✅</p>';
      return;
    }
    cont.innerHTML = '<h3 style="margin:0 0 8px;font-size:14px">⚠️ Alertas de puestos críticos</h3>' +
      alertas.map(function (a) {
        var color = _COLOR_URGENCIA_PC[a.urgencia] || '#6b7280';
        return '<div style="padding:10px;margin-bottom:8px;background:' + color + '20;' +
          'border-left:3px solid ' + color + ';border-radius:var(--r);font-size:var(--fs-sm)">' +
          (_ICONOS_ALERTA_PC[a.tipo] || '⚠️') + ' <strong>' + escapar(a.empleado) + ':</strong> ' +
          escapar(a.mensaje) + ' <span style="color:var(--txt-3)">(' + escapar(a.fecha) + ')</span>' +
        '</div>';
      }).join('') +
      '<div style="margin-bottom:16px"></div>';
  }

  function _pintarKpisPuestosCriticos(r) {
    document.getElementById('kpiPCTotal').textContent  = r.total || 0;
    document.getElementById('kpiPCDeptos').textContent = (r.porDepartamento || []).length;
  }

  function _pintarTablaPuestosCriticos(lista) {
    lista = lista || [];
    var cuerpo = document.getElementById('cuerpoPuestosCriticos');
    cuerpo.innerHTML = lista.map(function (e) {
      return '<tr>' +
        '<td>' + escapar(e.nombre) + '</td>' +
        '<td>' + escapar(e.cedula) + '</td>' +
        '<td>' + escapar(e.departamento) + '</td>' +
        '<td>' + escapar(e.puesto) + '</td>' +
        '<td>' + escapar(e.actividad) + '</td>' +
        '<td>' + escapar(e.jefe_inmediato) + '</td>' +
        '<td>' + escapar(e.telefono || '—') + '</td>' +
        '<td>' + escapar(e.correo || '—') + '</td>' +
        '<td>' + escapar(e.fecha_ingreso || '—') + '</td>' +
        '<td class="no-print"><button class="btn-mini" onclick="editarPuestoCritico(\'' + escaparAttr(e.id) + '\')">Editar</button></td>' +
      '</tr>';
    }).join('');
    document.getElementById('tablaPuestosCriticos').classList.toggle('oculto', lista.length === 0);
    document.getElementById('sinPuestosCriticos').classList.toggle('oculto', lista.length > 0);
  }

  /** Reutiliza el formulario completo de Empleados — asegura que EMPLEADOS
   *  esté cargado aunque el usuario nunca haya visitado esa pantalla. */
  function editarPuestoCritico(id) {
    if (EMPLEADOS && EMPLEADOS.length) {
      editarEmpleado(id);
    } else {
      llamarBackend('listarEmpleados', [''], function (lista) {
        EMPLEADOS = lista || [];
        editarEmpleado(id);
      });
    }
  }

  /** Abre el formulario de "Nuevo empleado" con cargo_critico pre-marcado. */
  function abrirNuevoPuestoCritico() {
    abrirFormularioNuevo();
    var sel = document.getElementById('cargo_critico');
    if (sel) { sel.value = 'SI'; alternarBloqueCumplimientoCritico(); }
  }
</script>
