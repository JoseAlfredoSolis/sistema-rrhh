<script>
  /* ============================================================
     MÓDULO VACACIONES — v9 (con balance)
     ============================================================ */

  function cargarVacaciones() {
    llenarSelectEmpleadosFiltro('filtroEmpVac');
    var empId = (document.getElementById('filtroEmpVac')||{}).value || '';
    var estado = (document.getElementById('filtroEstadoVac')||{}).value || '';
    var fechaDesde = (document.getElementById('filtroFechaDesde')||{}).value || '';
    var fechaHasta = (document.getElementById('filtroFechaHasta')||{}).value || '';
    var saldoCritico = (document.getElementById('filtroSaldoCritico')||{}).checked || false;

    llamarBackend('listarVacaciones', [empId||null, estado||null], function (lista) {
      var cuerpo = document.getElementById('cuerpoVacaciones');
      cuerpo.innerHTML = '';

      // Aplicar filtros en frontend
      var listaFiltrada = (lista || []).filter(function(v) {
        // Filtro por fecha desde (comparar fechas normalizadas)
        if (fechaDesde) {
          var fechaInicioNorm = v.fecha_inicio.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1');
          if (fechaInicioNorm < fechaDesde) return false;
        }
        // Filtro por fecha hasta
        if (fechaHasta) {
          var fechaInicioNorm = v.fecha_inicio.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1');
          if (fechaInicioNorm > fechaHasta) return false;
        }
        // Filtro por saldo crítico
        if (saldoCritico && v.saldo_disponible >= 5) return false;
        return true;
      });

      document.getElementById('sinVacaciones').classList.toggle('oculto', listaFiltrada.length > 0);
      listaFiltrada.forEach(function (v) {
        var estado = String(v.estado).toLowerCase();
        var acciones = '';
        if (estado === 'pendiente' && puedeEditar()) {
          acciones =
            '<button class="btn-mini" onclick="decidirVacaciones(\'' + escaparAttr(v.id) + '\',\'aprobada\')">Aprobar</button>' +
            '<button class="btn-mini peligro" onclick="decidirVacaciones(\'' + escaparAttr(v.id) + '\',\'rechazada\')">Rechazar</button>';
        } else {
          acciones = '<span style="color:var(--txt-3);font-size:13px">—</span>';
        }
        var saldoTexto = (v.saldo_disponible !== undefined) ? escapar(v.saldo_disponible) : '—';
        var saldoClass = (v.saldo_disponible !== undefined && v.saldo_disponible < 5) ? ' style="color:var(--warn)"' : '';
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + escapar(v.empleado_nombre) + '</td>' +
          '<td>' + escapar(v.fecha_inicio) + '</td>' +
          '<td>' + escapar(v.fecha_fin) + '</td>' +
          '<td>' + escapar(v.dias) + '</td>' +
          '<td' + saldoClass + '>' + saldoTexto + '</td>' +
          '<td>' + badge(estado) + '</td>' +
          '<td style="font-size:12.5px;color:var(--txt-2)">' + escapar(v.notas || '—') + '</td>' +
          '<td class="no-print">' + acciones + '</td>';
        cuerpo.appendChild(tr);
      });
      actualizarBadge();
    });
  }

  function limpiarFiltrosVacaciones() {
    document.getElementById('filtroEmpVac').value = '';
    document.getElementById('filtroEstadoVac').value = '';
    document.getElementById('filtroFechaDesde').value = '';
    document.getElementById('filtroFechaHasta').value = '';
    document.getElementById('filtroSaldoCritico').checked = false;
    cargarVacaciones();
    consultarBalanceVacaciones();
  }

  function consultarBalanceVacaciones() {
    var sel = document.getElementById('filtroEmpVac');
    var id  = sel ? sel.value : '';
    var panel = document.getElementById('balanceVacPanel');
    if (!id) { panel.classList.add('oculto'); return; }
    llamarBackend('obtenerBalanceVacaciones', [id], function (res) {
      if (!res.ok) { panel.classList.add('oculto'); return; }
      document.getElementById('balAcum').textContent  = res.diasAcumulados;
      document.getElementById('balUsado').textContent = res.diasUsados;
      document.getElementById('balDisp').textContent  = res.diasDisponibles;
      document.getElementById('balValor').textContent = formatearMoneda(res.valor_vacaciones || 0);
      panel.classList.remove('oculto');
    });
  }

  function abrirFormVacaciones() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos para solicitar vacaciones.', 'error'); return; }
    document.getElementById('formVacaciones').reset();
    llenarSelectEmpleados('vacEmpleado');
    document.getElementById('modalVacaciones').classList.remove('oculto');
  }

  function cerrarModalVacaciones() { document.getElementById('modalVacaciones').classList.add('oculto'); }

  function guardarVacaciones(evento) {
    evento.preventDefault();
    var datos = {
      empleado_id:  document.getElementById('vacEmpleado').value,
      fecha_inicio: document.getElementById('vacInicio').value,
      fecha_fin:    document.getElementById('vacFin').value,
      notas:        document.getElementById('vacNotas').value
    };
    if (!datos.empleado_id) { mostrarMensaje('Selecciona un empleado.', 'error'); return; }
    if (new Date(datos.fecha_fin) < new Date(datos.fecha_inicio)) {
      mostrarMensaje('La fecha de fin no puede ser anterior a la de inicio.', 'error'); return;
    }
    var btn = document.getElementById('btnGuardarVacaciones');
    btn.disabled = true; btn.textContent = 'Enviando...';
    llamarBackend('crearVacaciones', [datos], function (res) {
      btn.disabled = false; btn.textContent = 'Solicitar';
      if (res.ok) {
        cerrarModalVacaciones();
        mostrarMensaje(res.mensaje, 'exito');
        cargarVacaciones();
      } else { mostrarMensaje(res.mensaje, 'error'); }
    });
  }

  function decidirVacaciones(id, nuevoEstado) {
    var verbo = (nuevoEstado === 'aprobada') ? 'aprobar' : 'rechazar';
    if (!confirm('¿Seguro que deseas ' + verbo + ' esta solicitud?')) return;
    llamarBackend('cambiarEstadoVacaciones', [id, nuevoEstado], function (res) {
      mostrarMensaje(res.mensaje, res.ok ? 'exito' : 'error');
      if (res.ok) { cargarVacaciones(); consultarBalanceVacaciones(); }
    });
  }

  // ====== MÓDULO SOLICITUD POR JEFE ======

  var _vacJefeSubalternoId = null;
  var _vacJefeNombre = '';

  function abrirModalVacJefe() {
    if (!puedeEditar()) { mostrarMensaje('Sin permisos.', 'error'); return; }
    llenarSelectEmpleados('vacJefeSelect');
    document.getElementById('vacJefeSelect').value = '';
    document.getElementById('vacJefePanel').classList.add('oculto');
    document.getElementById('vacJefeFormWrap').classList.add('oculto');
    document.getElementById('vacJefeSubalternos').innerHTML = '';
    document.getElementById('vacJefeSinSub').classList.add('oculto');
    _vacJefeSubalternoId = null;
    document.getElementById('modalVacJefe').classList.remove('oculto');
  }

  function cerrarModalVacJefe() {
    document.getElementById('modalVacJefe').classList.add('oculto');
  }

  function cargarSubalternos() {
    var jefeId = document.getElementById('vacJefeSelect').value;
    var panel = document.getElementById('vacJefePanel');
    if (!jefeId) { panel.classList.add('oculto'); return; }

    _vacJefeNombre = document.getElementById('vacJefeSelect').options[document.getElementById('vacJefeSelect').selectedIndex].text;
    panel.classList.remove('oculto');
    document.getElementById('vacJefeSubalternos').innerHTML = '<p style="color:var(--txt-3);font-size:13px">Cargando...</p>';
    document.getElementById('vacJefeFormWrap').classList.add('oculto');
    _vacJefeSubalternoId = null;

    llamarBackend('listarSubalternos', [jefeId], function(lista) {
      var cont = document.getElementById('vacJefeSubalternos');
      cont.innerHTML = '';
      if (!lista || lista.length === 0) {
        document.getElementById('vacJefeSinSub').classList.remove('oculto');
        return;
      }
      document.getElementById('vacJefeSinSub').classList.add('oculto');
      lista.forEach(function(sub) {
        var saldoColor = sub.diasDisponibles < 3 ? 'var(--warn)' : 'var(--exito)';
        var card = document.createElement('div');
        card.className = 'card-subalterno';
        card.style.cssText = 'border:1px solid var(--borde);border-radius:8px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s,border-color .15s';
        card.innerHTML =
          '<div style="font-weight:600;font-size:14px;color:var(--txt-1)">' + escapar(sub.nombre) + '</div>' +
          '<div style="font-size:12px;color:var(--txt-2);margin:2px 0">' + escapar(sub.puesto || sub.departamento || '') + '</div>' +
          '<div style="margin-top:6px;font-size:13px">' +
            'Saldo: <strong style="color:' + saldoColor + '">' + sub.diasDisponibles + ' días</strong>' +
            ' <span style="color:var(--txt-3);font-size:11px">(Acum. ' + sub.diasAcumulados + ' / Usados ' + sub.diasUsados + ')</span>' +
          '</div>';
        card.onclick = function() { seleccionarSubalterno(sub); };
        card.onmouseover = function() { this.style.boxShadow = '0 2px 8px rgba(0,0,0,.12)'; this.style.borderColor = 'var(--primario)'; };
        card.onmouseout  = function() { this.style.boxShadow = ''; this.style.borderColor = 'var(--borde)'; };
        cont.appendChild(card);
      });
    });
  }

  function seleccionarSubalterno(sub) {
    _vacJefeSubalternoId = sub.id;
    document.getElementById('vacJefeFormTitulo').textContent = 'Solicitud para: ' + sub.nombre;
    document.getElementById('vacJefeSaldo').textContent = sub.diasDisponibles;
    document.getElementById('vacJefeInicio').value = '';
    document.getElementById('vacJefeFin').value = '';
    document.getElementById('vacJefeNotas').value = '';
    // Highlight card selected
    document.querySelectorAll('.card-subalterno').forEach(function(c) {
      c.style.background = '';
      c.style.borderColor = 'var(--borde)';
    });
    event.currentTarget.style.background = 'var(--fondo-alt, #f0f7ff)';
    event.currentTarget.style.borderColor = 'var(--primario)';
    document.getElementById('vacJefeFormWrap').classList.remove('oculto');
    document.getElementById('vacJefeInicio').focus();
  }

  function limpiarSeleccionSubalterno() {
    _vacJefeSubalternoId = null;
    document.getElementById('vacJefeFormWrap').classList.add('oculto');
    document.querySelectorAll('.card-subalterno').forEach(function(c) {
      c.style.background = '';
      c.style.borderColor = 'var(--borde)';
    });
  }

  function guardarVacacionesJefe() {
    if (!_vacJefeSubalternoId) { mostrarMensaje('Selecciona un subalterno.', 'error'); return; }
    var inicio = document.getElementById('vacJefeInicio').value;
    var fin    = document.getElementById('vacJefeFin').value;
    if (!inicio || !fin) { mostrarMensaje('Completa las fechas.', 'error'); return; }
    if (new Date(fin) < new Date(inicio)) { mostrarMensaje('La fecha fin no puede ser anterior al inicio.', 'error'); return; }

    var btn = document.getElementById('btnGuardarVacJefe');
    btn.disabled = true; btn.textContent = 'Guardando...';

    var datos = {
      empleado_id:   _vacJefeSubalternoId,
      fecha_inicio:  inicio,
      fecha_fin:     fin,
      notas:         document.getElementById('vacJefeNotas').value,
      solicitado_por: _vacJefeNombre
    };

    llamarBackend('crearVacaciones', [datos], function(res) {
      btn.disabled = false; btn.textContent = 'Solicitar vacaciones';
      if (res.ok) {
        cerrarModalVacJefe();
        mostrarMensaje('Solicitud creada para el subalterno (' + (res.mensaje || '') + ')', 'exito');
        cargarVacaciones();
      } else {
        mostrarMensaje(res.mensaje, 'error');
      }
    });
  }
</script>
