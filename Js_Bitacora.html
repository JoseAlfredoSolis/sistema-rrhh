<script>
  /* ============================================================
     MÓDULO BITÁCORA DE CAMBIOS — v9
     ============================================================ */

  function cargarBitacora() {
    llamarBackend('listarBitacora', [200], function (lista) {
      var cuerpo = document.getElementById('cuerpoBitacora');
      cuerpo.innerHTML = '';
      document.getElementById('sinBitacora').classList.toggle('oculto', (lista || []).length > 0);
      (lista || []).forEach(function (r) {
        var accionColor = {
          crear: 'var(--ok)', actualizar: 'var(--info)',
          eliminar: 'var(--err)', respaldo: 'var(--p)'
        }[r.accion] || 'var(--txt-3)';
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td style="font-size:12px;white-space:nowrap">' + escapar(r.fecha) + '</td>' +
          '<td style="font-size:12px">' + escapar(r.usuario || '—') + '</td>' +
          '<td><span style="color:' + accionColor + ';font-weight:600;font-size:12px;text-transform:capitalize">' + escapar(r.accion) + '</span></td>' +
          '<td style="font-size:12px">' + escapar(r.entidad || '—') + '</td>' +
          '<td style="font-size:11px;color:var(--txt-3)">' + escapar(String(r.entidad_id || '').slice(0, 20)) + '</td>' +
          '<td style="font-size:12px">' + escapar(r.resumen || '—') + '</td>';
        cuerpo.appendChild(tr);
      });
    });
  }
</script>
