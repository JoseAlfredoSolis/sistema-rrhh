<script>
  /* ============================================================
     MÓDULO REPORTES — Chart.js local (Lib_Chart)
     ============================================================ */
  var ULTIMOS_REPORTES = null;

  window.addEventListener('resize', function () {
    if (ULTIMOS_REPORTES &&
        !document.getElementById('vista-reportes').classList.contains('oculto')) {
      dibujarReportes(ULTIMOS_REPORTES);
    }
  });

  function cargarReportes() {
    llenarSelectEmpleadosFiltro('filtroEmpReportes');
    var empId = (document.getElementById('filtroEmpReportes') || {}).value || '';
    var fechaDesde = (document.getElementById('filtroDesdeReportes') || {}).value || '';
    var fechaHasta = (document.getElementById('filtroHastaReportes') || {}).value || '';
    cargarLibreriaLocal('chart', function () {
      if (typeof Chart === 'undefined') {
        mostrarCargando(true);
        setTimeout(cargarReportes, 200);
        return;
      }
      llamarBackend('obtenerReportes', [empId, fechaDesde, fechaHasta], function (r) {
        ULTIMOS_REPORTES = r;
        dibujarReportes(r);
      });
    });
  }

  function dibujarReportes(r) {
    graficoPastel('grafDepartamentos', r.empleadosPorDepartamento);
    graficoDona('grafEstado', r.empleadosPorEstado, ['#059669', '#9ca3af', '#d97706', '#dc2626']);
    graficoColumnas('grafNomina', r.nominaPorMes, '#2563eb', true);
    graficoBarras('grafHoras', r.horasPorEmpleado, '#7c3aed');
    graficoPastel('grafVacaciones', r.vacacionesPorEstado);
  }

  function alternarVacio(idDiv, hayDatos) {
    var aviso = document.querySelector('.grafico-vacio[data-for="' + idDiv + '"]');
    if (aviso) aviso.classList.toggle('oculto', hayDatos);
    document.getElementById(idDiv).style.display = hayDatos ? '' : 'none';
  }

  function graficoPastel(idDiv, datos) {
    var hay = datos && datos.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'pie',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          data: datos.map(function (d) { return Number(d[1]) || 0; })
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        plugins: { legend: { position: 'bottom' } }
      })
    });
  }

  function graficoDona(idDiv, datos, colores) {
    var hay = datos && datos.some(function (d) { return d[1] > 0; });
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          data: datos.map(function (d) { return Number(d[1]) || 0; }),
          backgroundColor: colores
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        cutout: '40%',
        plugins: { legend: { position: 'bottom' } }
      })
    });
  }

  function graficoColumnas(idDiv, datos, color, esDinero) {
    var hay = datos && datos.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          label: esDinero ? 'Neto' : 'Cantidad',
          data: datos.map(function (d) { return Number(d[1]) || 0; }),
          backgroundColor: color,
          borderRadius: 6
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        plugins: {
          legend: { display: false },
          tooltip: esDinero ? {
            callbacks: { label: function (ctx) { return formatoDinero(ctx.parsed.y); } }
          } : {}
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: esDinero ? { callback: function (v) { return formatoDinero(v); } } : {}
          }
        }
      })
    });
  }

  function graficoBarras(idDiv, datos, color) {
    var hay = datos && datos.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var cont = document.getElementById(idDiv);
    cont.style.height = Math.max(280, datos.length * 38 + 80) + 'px';
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          label: 'Horas',
          data: datos.map(function (d) { return Number(d[1]) || 0; }),
          backgroundColor: color,
          borderRadius: 6
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
      })
    });
  }
</script>
