<script>
  /* ============================================================
     MÓDULO REPORTES — Chart.js local (Lib_Chart)
     ============================================================ */
  var ULTIMOS_REPORTES = null;

  window.addEventListener('resize', function () {
    if (ULTIMOS_REPORTES &&
        !document.getElementById('vista-reportes').classList.contains('oculto')) {
      dibujarReportes(ULTIMOS_REPORTES);
    }
  });

  function cargarReportes() {
    llenarSelectEmpleadosFiltro('filtroEmpReportes');
    var empId = (document.getElementById('filtroEmpReportes') || {}).value || '';
    var fechaDesde = (document.getElementById('filtroDesdeReportes') || {}).value || '';
    var fechaHasta = (document.getElementById('filtroHastaReportes') || {}).value || '';
    cargarLibreriaLocal('chart', function () {
      if (typeof Chart === 'undefined') {
        mostrarCargando(true);
        setTimeout(cargarReportes, 200);
        return;
      }
      llamarBackend('obtenerReportes', [empId, fechaDesde, fechaHasta], function (r) {
        ULTIMOS_REPORTES = r;
        dibujarReportes(r);
      });
    });
  }

  function dibujarReportes(r) {
    _pintarKpisReportes(r.kpis);
    graficoPastel('grafDepartamentos', r.empleadosPorDepartamento);
    graficoDona('grafEstado', r.empleadosPorEstado, ['#059669', '#9ca3af', '#d97706', '#dc2626']);
    graficoColumnas('grafNomina', r.nominaPorMes, '#2563eb', true);
    graficoBarras('grafNominaDepto', r.nominaPorDepartamento, '#2563eb', true);
    graficoBarras('grafHoras', r.horasPorEmpleado, '#7c3aed');
    graficoColumnas('grafHorasExtra', r.horasExtraPorMes, '#0891b2');
    graficoColumnas('grafIncapacidades', r.incapacidadesPorMes, '#d97706');
    graficoRotacion('grafRotacion', r.rotacionPorMes);
    graficoPastel('grafVacaciones', r.vacacionesPorEstado);
  }

  function _pintarKpisReportes(k) {
    k = k || {};
    document.getElementById('kpiRepActivos').textContent  = (k.activos != null) ? k.activos : '—';
    document.getElementById('kpiRepNeto').textContent     = formatoDinero(k.netoPeriodo || 0);
    document.getElementById('kpiRepHex').textContent      = (k.horasExtraHoras || 0) + ' h';
    document.getElementById('kpiRepHexMonto').textContent = formatoDinero(k.horasExtraMonto || 0);
    document.getElementById('kpiRepIncap').textContent    = (k.diasIncapacidad || 0) + ' días';
    document.getElementById('kpiRepVacPend').textContent  = k.vacacionesPendientes || 0;
  }

  /** Exporta todos los datos de los reportes (una hoja por gráfico) a Excel. */
  function exportarReportesExcel() {
    if (!ULTIMOS_REPORTES) { mostrarMensaje('Primero carga los reportes.', 'error'); return; }
    var r = ULTIMOS_REPORTES;
    cargarLibreriaLocal('xlsx', function () {
      if (typeof XLSX === 'undefined') {
        mostrarMensaje('La librería XLSX no está cargada.', 'error');
        return;
      }
      var wb = XLSX.utils.book_new();
      function hoja(nombre, encabezados, filas) {
        if (!filas || !filas.length) return;
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([encabezados].concat(filas)), nombre);
      }
      var k = r.kpis || {};
      hoja('KPIs', ['Indicador', 'Valor'], [
        ['Empleados activos', k.activos || 0],
        ['Nómina neta del período', k.netoPeriodo || 0],
        ['Horas extra del período (h)', k.horasExtraHoras || 0],
        ['Costo horas extra', k.horasExtraMonto || 0],
        ['Días de incapacidad', k.diasIncapacidad || 0],
        ['Vacaciones pendientes', k.vacacionesPendientes || 0]
      ]);
      hoja('Por departamento', ['Departamento', 'Empleados activos'], r.empleadosPorDepartamento);
      hoja('Por estado', ['Estado', 'Empleados'], r.empleadosPorEstado);
      hoja('Nómina por mes', ['Mes', 'Neto'], r.nominaPorMes);
      hoja('Nómina por depto', ['Departamento', 'Neto'], r.nominaPorDepartamento);
      hoja('Horas asistencia', ['Empleado', 'Horas'], r.horasPorEmpleado);
      hoja('Horas extra por mes', ['Mes', 'Horas'], r.horasExtraPorMes);
      hoja('Incapacidades por mes', ['Mes', 'Días'], r.incapacidadesPorMes);
      if (r.rotacionPorMes && r.rotacionPorMes.meses.length) {
        hoja('Rotación', ['Mes', 'Contrataciones', 'Salidas'], r.rotacionPorMes.meses.map(function (m, i) {
          return [m, r.rotacionPorMes.altas[i], r.rotacionPorMes.bajas[i]];
        }));
      }
      hoja('Vacaciones por estado', ['Estado', 'Solicitudes'], r.vacacionesPorEstado);
      if (!wb.SheetNames.length) { mostrarMensaje('No hay datos para exportar.', 'error'); return; }
      XLSX.writeFile(wb, 'reportes_rrhh_' + new Date().toISOString().slice(0, 10) + '.xlsx');
    });
  }

  /** Columnas agrupadas de contrataciones (verde) vs salidas (rojo) por mes. */
  function graficoRotacion(idDiv, rot) {
    var hay = rot && rot.meses && rot.meses.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: rot.meses,
        datasets: [
          { label: 'Contrataciones', data: rot.altas, backgroundColor: '#059669', borderRadius: 6 },
          { label: 'Salidas',        data: rot.bajas, backgroundColor: '#dc2626', borderRadius: 6 }
        ]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
      })
    });
  }

  function alternarVacio(idDiv, hayDatos) {
    var aviso = document.querySelector('.grafico-vacio[data-for="' + idDiv + '"]');
    if (aviso) aviso.classList.toggle('oculto', hayDatos);
    document.getElementById(idDiv).style.display = hayDatos ? '' : 'none';
  }

  function graficoPastel(idDiv, datos) {
    var hay = datos && datos.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'pie',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          data: datos.map(function (d) { return Number(d[1]) || 0; })
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        plugins: { legend: { position: 'bottom' } }
      })
    });
  }

  function graficoDona(idDiv, datos, colores) {
    var hay = datos && datos.some(function (d) { return d[1] > 0; });
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          data: datos.map(function (d) { return Number(d[1]) || 0; }),
          backgroundColor: colores
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        cutout: '40%',
        plugins: { legend: { position: 'bottom' } }
      })
    });
  }

  function graficoColumnas(idDiv, datos, color, esDinero) {
    var hay = datos && datos.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          label: esDinero ? 'Neto' : 'Cantidad',
          data: datos.map(function (d) { return Number(d[1]) || 0; }),
          backgroundColor: color,
          borderRadius: 6
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        plugins: {
          legend: { display: false },
          tooltip: esDinero ? {
            callbacks: { label: function (ctx) { return formatoDinero(ctx.parsed.y); } }
          } : {}
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: esDinero ? { callback: function (v) { return formatoDinero(v); } } : {}
          }
        }
      })
    });
  }

  function graficoBarras(idDiv, datos, color, esDinero) {
    var hay = datos && datos.length > 0;
    alternarVacio(idDiv, hay);
    if (!hay) return;
    var cont = document.getElementById(idDiv);
    cont.style.height = Math.max(280, datos.length * 38 + 80) + 'px';
    var canvas = prepararCanvasGrafico(idDiv);
    _chartInst[idDiv] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: datos.map(function (d) { return d[0]; }),
        datasets: [{
          label: esDinero ? 'Neto' : 'Horas',
          data: datos.map(function (d) { return Number(d[1]) || 0; }),
          backgroundColor: color,
          borderRadius: 6
        }]
      },
      options: Object.assign({}, CHART_OPTS_BASE, {
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: esDinero ? {
            callbacks: { label: function (ctx) { return formatoDinero(ctx.parsed.x); } }
          } : {}
        },
        scales: {
          x: {
            beginAtZero: true,
            ticks: esDinero ? { callback: function (v) { return formatoDinero(v); } } : {}
          }
        }
      })
    });
  }
</script>
